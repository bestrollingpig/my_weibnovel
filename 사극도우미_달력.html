<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사극 창작 달력</title>
<style>
:root {
  --bg: #0f1117;
  --panel: #181c24;
  --panel2: #1e2330;
  --border: #2e3545;
  --text: #dde3ef;
  --sub: #8a93a8;
  --accent: #c8a35a;
  --accent-dim: #8a6e35;
  --spring: #6dab7a;
  --summer: #e07a5f;
  --autumn: #e09f3e;
  --winter: #6a9ec5;
  --radius: 10px;
  --font: "맑은 고딕", "Malgun Gothic", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; overflow: hidden; }
button, input, select, textarea { font: inherit; }
button { cursor: pointer; }

/* ── 레이아웃 ── */
#app {
  display: grid;
  grid-template-columns: 280px 1fr 340px;
  grid-template-rows: 100vh;
  height: 100vh;
  overflow: hidden;
}
.left-panel { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.main-area { overflow-y: auto; display: flex; flex-direction: column; background: var(--bg); }
.right-panel { background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

/* ── 반응형 ── */
@media (max-width: 1024px) {
  #app { grid-template-columns: 240px 1fr 280px; }
}
@media (max-width: 768px) {
  #app { 
    grid-template-columns: 1fr; 
    grid-template-rows: auto 1fr auto;
    height: auto;
    overflow-y: auto;
  }
  .left-panel { border-right: none; border-bottom: 1px solid var(--border); max-height: 300px; }
  .right-panel { border-left: none; border-top: 1px solid var(--border); max-height: 400px; }
  .main-area { min-height: 500px; }
  .cal-cell { min-height: 60px; }
}

/* ── 스크롤바 ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #3a4255; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

/* ── 계절별 배경 ── */
body.season-봄 { background: linear-gradient(135deg, #1a2a1a, var(--bg)); }
body.season-여름 { background: linear-gradient(135deg, #2a1a1a, var(--bg)); }
body.season-가을 { background: linear-gradient(135deg, #2a2a1a, var(--bg)); }
body.season-겨울 { background: linear-gradient(135deg, #1a1a2a, var(--bg)); }

/* ── 왼쪽 패널 ── */
.left-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.app-title {
  font-size: 16px;
  font-weight: bold;
  color: var(--accent);
  letter-spacing: 2px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.app-title small { font-size: 11px; color: var(--sub); font-weight: normal; letter-spacing: 0; }
.theme-select-wrap {
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.theme-select-wrap label { font-size: 10px; color: var(--sub); white-space: nowrap; }
.theme-select-wrap select {
  background: #0d1018;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 11px;
  flex: 1;
}
.project-inputs { display: flex; flex-direction: column; gap: 4px; }
.project-inputs input {
  background: #0d1018;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  width: 100%;
  transition: border-color 0.2s;
}
.project-inputs input::placeholder { color: var(--sub); }
.project-inputs input:focus { outline: none; border-color: var(--accent); }

.left-body { flex: 1; overflow-y: auto; }

.search-wrap { padding: 10px 16px; border-bottom: 1px solid var(--border); }
.search-wrap input {
  background: #0d1018;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 12px;
  width: 100%;
  transition: border-color 0.2s;
}
.search-wrap input::placeholder { color: var(--sub); }
.search-wrap input:focus { outline: none; border-color: var(--accent); }
.search-count { font-size: 11px; color: var(--sub); margin-top: 4px; }

.dict-section { padding: 10px 16px; }
.dict-label { font-size: 10px; color: var(--sub); letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase; }
.dict-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.dict-tag {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--sub);
  cursor: pointer;
  transition: all 0.15s;
}
.dict-tag:hover { border-color: var(--accent-dim); color: var(--accent); transform: translateY(-1px); }
.dict-tag.active { background: var(--accent-dim); border-color: var(--accent); color: #fff; }

.search-results { padding: 0 16px 16px; max-height: 400px; overflow-y: auto; }
.search-result-item {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  margin-bottom: 6px;
  font-size: 12px;
  line-height: 1.5;
  transition: border-color 0.2s;
}
.search-result-item:hover { border-color: var(--accent-dim); }
.search-result-item .r-name { color: var(--accent); font-weight: bold; margin-bottom: 2px; }
.search-result-item .r-desc { color: var(--sub); font-size: 11px; }
.search-result-item .r-cat { color: var(--accent-dim); font-size: 10px; margin-left: 6px; }

/* ── 메인: 달력 ── */
.cal-header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  background: var(--panel);
  position: sticky;
  top: 0;
  z-index: 10;
}
.cal-nav {
  display: flex;
  align-items: center;
  gap: 6px;
}
.cal-nav select {
  background: #0d1018;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 8px;
  font-size: 13px;
  transition: border-color 0.2s;
}
.cal-nav select:focus { outline: none; border-color: var(--accent); }
.btn-nav {
  background: var(--panel2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 14px;
  transition: all 0.15s;
}
.btn-nav:hover { border-color: var(--accent-dim); color: var(--accent); background: #2a2f3d; }
.btn-today {
  background: var(--panel2);
  color: var(--sub);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 11px;
  transition: all 0.15s;
}
.btn-today:hover { border-color: var(--accent-dim); color: var(--accent); }

.season-badge {
  margin-left: auto;
  font-size: 12px;
  color: var(--sub);
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  transition: all 0.3s;
}
.season-봄 { color: var(--spring); border-color: var(--spring); background: rgba(109,171,122,0.1); }
.season-여름 { color: var(--summer); border-color: var(--summer); background: rgba(224,122,95,0.1); }
.season-가을 { color: var(--autumn); border-color: var(--autumn); background: rgba(224,159,62,0.1); }
.season-겨울 { color: var(--winter); border-color: var(--winter); background: rgba(106,158,197,0.1); }

/* ── 달력 그리드 ── */
.cal-body { padding: 12px 16px 16px; flex: 1; }

.cal-week-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  margin-bottom: 3px;
}
.cal-week-header div {
  text-align: center;
  font-size: 10px;
  color: var(--sub);
  padding: 4px;
  font-weight: bold;
  letter-spacing: 1px;
}
.cal-week-header div:first-child { color: #e07a6f; }
.cal-week-header div:last-child { color: #6a9ec5; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.cal-cell {
  min-height: 85px;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 6px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  gap: 1px;
  position: relative;
  overflow: hidden;
}
.cal-cell:hover { border-color: var(--accent-dim); background: #232840; transform: translateY(-1px); }
.cal-cell.selected { border-color: var(--accent); background: #2a2d1a; box-shadow: 0 0 20px rgba(200,163,90,0.1); }
.cal-cell.empty { background: transparent; border-color: transparent; cursor: default; }
.cal-cell.empty:hover { transform: none; background: transparent; }
.cal-cell.today .c-num { background: var(--accent); color: #000; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
.cal-cell.has-term { border-color: var(--accent-dim); }
.cal-cell.past { opacity: 0.7; }
.cal-cell.future { opacity: 0.9; }
.cal-cell.weekend { background: rgba(224,122,95,0.05); }

.c-num { 
  font-size: 13px; 
  font-weight: bold; 
  color: var(--text); 
  line-height: 1.2;
  margin-bottom: 1px;
}
.c-sun .c-num { color: #e07a6f; }
.c-sat .c-num { color: #6a9ec5; }

.c-lunar { font-size: 9px; color: #7ab0e0; opacity: 0.8; }
.c-ganji { font-size: 9px; color: var(--accent-dim); opacity: 0.7; }
.c-term {
  font-size: 9px;
  font-weight: bold;
  color: var(--accent);
  background: rgba(200,163,90,0.12);
  padding: 1px 4px;
  border-radius: 3px;
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.c-hou { font-size: 9px; color: var(--spring); opacity: 0.8; }
.c-event { 
  font-size: 9px; 
  color: #e07a5f; 
  font-weight: bold;
  background: rgba(224,122,95,0.1);
  padding: 0 3px;
  border-radius: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.c-weather {
  font-size: 10px;
  position: absolute;
  top: 4px;
  right: 6px;
  opacity: 0.6;
}

/* ── 오른쪽 패널 ── */
.right-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.right-title { font-size: 13px; color: var(--accent); font-weight: bold; letter-spacing: 1px; }
.right-title small { font-size: 11px; color: var(--sub); font-weight: normal; }

.right-body { flex: 1; overflow-y: auto; padding: 14px 16px; }

/* 날짜 상세 */
.date-detail { margin-bottom: 12px; }
.date-big {
  font-size: 22px;
  font-weight: bold;
  color: var(--text);
  margin-bottom: 2px;
}
.date-sub { font-size: 12px; color: var(--sub); }

.info-block {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 8px;
}
.info-block-title {
  font-size: 10px;
  color: var(--sub);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.info-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 4px;
  font-size: 12px;
  line-height: 1.5;
}
.info-label { color: var(--sub); min-width: 36px; flex-shrink: 0; }
.info-val { color: var(--text); }
.info-val.accent { color: var(--accent); font-weight: bold; }
.info-val.blue { color: #7ab0e0; }
.info-val.green { color: var(--spring); }
.info-val.red { color: #e07a5f; }

.rhythm-box {
  background: #0d1018;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 12px;
  line-height: 1.6;
  color: #b0bac8;
}
.rhythm-box .emoji { font-size: 20px; margin-bottom: 4px; display: block; }
.rhythm-box .rhythm-term { color: var(--accent); font-weight: bold; margin-bottom: 2px; }
.rhythm-box .rhythm-desc { color: var(--sub); font-size: 11px; }

/* 메모 */
.memo-section { 
  border-top: 1px solid var(--border); 
  padding: 10px 16px; 
  flex-shrink: 0;
  background: var(--panel);
}
.memo-label { 
  font-size: 10px; 
  color: var(--sub); 
  margin-bottom: 4px; 
  letter-spacing: 1px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.memo-label .memo-count { font-size: 10px; color: var(--sub); }
.memo-section textarea {
  width: 100%;
  background: #0d1018;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 8px;
  font-size: 12px;
  resize: vertical;
  height: 70px;
  line-height: 1.5;
  transition: border-color 0.2s;
}
.memo-section textarea:focus { outline: none; border-color: var(--accent); }

/* 표현 생성 */
.expr-section { 
  border-top: 1px solid var(--border); 
  padding: 10px 16px; 
  flex-shrink: 0;
  background: var(--panel);
}
.expr-label { 
  font-size: 10px; 
  color: var(--sub); 
  margin-bottom: 4px; 
  letter-spacing: 1px; 
  display: flex; 
  justify-content: space-between; 
  align-items: center;
}
.btn-gen {
  background: var(--accent-dim);
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 3px 10px;
  font-size: 11px;
  transition: opacity 0.2s;
}
.btn-gen:hover { opacity: 0.8; }
.expr-content {
  font-size: 12px;
  line-height: 1.6;
  color: #b0bac8;
  min-height: 50px;
  padding: 4px 0;
  white-space: pre-wrap;
}

/* ── 선택 없을 때 안내 ── */
.no-select {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 180px;
  color: var(--sub);
  font-size: 13px;
  gap: 6px;
}
.no-select span { font-size: 32px; }

/* ── 현재 시각 ── */
.time-bar {
  padding: 6px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  font-size: 12px;
  background: var(--panel);
}
.time-now { color: var(--text); font-weight: bold; }
.time-trad { color: var(--accent); }

/* ── 로딩 ── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100px;
  color: var(--sub);
  font-size: 13px;
}
.loading::after {
  content: "";
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-left: 10px;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ── 툴팁 ── */
.tooltip {
  position: fixed;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text);
  max-width: 250px;
  z-index: 1000;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.tooltip.visible { opacity: 1; }
</style>
</head>
<body>

<div id="app">

<!-- ── 왼쪽 패널 ── -->
<div class="left-panel">
  <div class="left-header">
    <div class="app-title">
      📜 사극 창작 달력
      <small>v2.0</small>
    </div>
    <div class="project-inputs">
      <input id="novelTitle" placeholder="작품명">
      <input id="eraName" placeholder="시대 (예: 조선 중기)">
      <input id="countryName" placeholder="국가 / 배경">
    </div>
    <div class="theme-select-wrap" style="margin-top:8px;">
      <label>테마:</label>
      <select id="themeSelect">
        <option value="classic">🏮 기본</option>
        <option value="warm">🕯️ 온화</option>
        <option value="cool">❄️ 청량</option>
        <option value="dark">🌑 다크</option>
      </select>
    </div>
  </div>

  <div class="search-wrap">
    <input id="searchBox" placeholder="🔍 관직 · 화폐 · 음식 · 절기 · 표현 검색…">
    <div class="search-count" id="searchCount"></div>
  </div>

  <div class="left-body">
    <div class="dict-section">
      <div class="dict-label">📚 자료 사전</div>
      <div class="dict-tags" id="dictTags"></div>
    </div>
    <div class="search-results" id="searchResults"></div>
    <div style="padding:12px 16px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--sub);line-height:1.6;">
      <div style="font-size:10px;color:var(--accent-dim);letter-spacing:1px;margin-bottom:4px;">📖 도움말</div>
      · 음력은 1900~2100년 실제 데이터, 그 외는 근삿값<br>
      · 왕 정보는 1392~1910년(조선)만 표시<br>
      · 단축키: ←→월 ↑↓년 T오늘 G생성 S검색 E내보내기<br>
      · 달력 날짜 클릭 → 상세 정보 + 문장 생성
    </div>
  </div>
</div>

<!-- ── 메인: 달력 ── -->
<div class="main-area">
  <div class="cal-header">
    <div class="cal-nav">
      <button class="btn-nav" id="prevYear" title="이전 연도">◀◀</button>
      <button class="btn-nav" id="prevMonth" title="이전 월">◀</button>
      <select id="yearSelect"></select>
      <select id="monthSelect"></select>
      <button class="btn-nav" id="nextMonth" title="다음 월">▶</button>
      <button class="btn-nav" id="nextYear" title="다음 연도">▶▶</button>
      <button class="btn-today" id="todayBtn">오늘</button>
    </div>
    <div class="season-badge" id="seasonBadge"></div>
  </div>
  <div class="cal-body">
    <div class="cal-week-header">
      <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<!-- ── 오른쪽 패널 ── -->
<div class="right-panel">
  <div class="time-bar">
    <span class="time-now" id="timeNow">--:--:--</span>
    <span>·</span>
    <span class="time-trad" id="timeTrad"></span>
    <span style="margin-left:auto;font-size:10px;color:var(--sub);" id="timeDate"></span>
  </div>

  <div class="right-header">
    <div class="right-title" id="rightTitle">📅 날짜 정보</div>
    <small id="rightSub"></small>
  </div>

  <div class="right-body" id="rightBody">
    <div class="no-select">
      <span>📅</span>
      달력에서 날짜를 선택하세요
    </div>
  </div>

  <div class="expr-section">
    <div class="expr-label">
      <span>✍️ 문장 생성</span>
      <button class="btn-gen" id="genBtn">🎲 새로 생성</button>
    </div>
    <div class="expr-content" id="exprContent"></div>
  </div>

  <div class="memo-section">
    <div class="memo-label">
      <span>📝 창작 메모</span>
      <span class="memo-count" id="memoCount">0자</span>
    </div>
    <textarea id="memo" placeholder="장면, 대사, 아이디어…"></textarea>
    <div class="memo-stats" id="memoStats" style="font-size:10px;color:var(--sub);margin-top:4px;display:flex;gap:12px;flex-wrap:wrap;"></div>
    <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
      <button class="btn-gen" id="exportBtn" style="font-size:11px;padding:4px 10px;">💾 내보내기</button>
      <button class="btn-gen" id="shareBtn" style="font-size:11px;padding:4px 10px;">📤 공유</button>
    </div>
  </div>
</div>

</div>

<script>
"use strict";

/* =============================================

  "스무이레", "스무여드레", "스무아흐레", "그믐"

// 음력-양력 변환 함수
function solarToLunar(year, month, day) {
  // 1900년 1월 1일 = 음력 1900년 1월 1일 (기준)
  const baseDate = new Date(1900, 0, 1);
  const targetDate = new Date(year, month - 1, day);
  let diffDays = Math.floor((targetDate - baseDate) / 86400000);
  
  if (diffDays < 0) {
    // 1900년 이전은 간단히 처리
    return { lunarYear: year, lunarMonth: 1, lunarDay: day, isLeap: false };
  }
  
  let lunarYear = 1900;
  let lunarMonth = 1;
  let lunarDay = 1;
  let isLeap = false;
  
  // 년도 계산
  while (diffDays > 0) {
    const info = LUNAR_INFO[lunarYear];
    if (!info) break;
    const totalDays = info[1].reduce((a, b) => a + b, 0) + (info[0] > 0 ? 29 : 0);
    if (diffDays >= totalDays) {
      diffDays -= totalDays;
      lunarYear++;
    } else {
      break;
    }
  }
  
  // 월 계산
  const info = LUNAR_INFO[lunarYear];
  if (info) {
    const months = info[1];
    const leapMonth = info[0];
    let monthIdx = 0;
    
    while (diffDays > 0 && monthIdx < months.length) {
      const daysInMonth = months[monthIdx];
      if (diffDays >= daysInMonth) {
        diffDays -= daysInMonth;
        monthIdx++;
        // 윤달 확인
        if (leapMonth > 0 && monthIdx === leapMonth) {
          // 윤달 처리
          const leapDays = 29;
          if (diffDays >= leapDays) {
            diffDays -= leapDays;
            monthIdx++;
          } else {
            isLeap = true;
            lunarMonth = monthIdx;
            lunarDay = diffDays + 1;
            diffDays = 0;
            break;
          }
        }
      } else {
        lunarMonth = monthIdx + 1;
        lunarDay = diffDays + 1;
        diffDays = 0;
        break;
      }
    }
    
    if (diffDays === 0 && lunarMonth === 0) {
      lunarMonth = 1;
      lunarDay = 1;
    }
  }
  
  return { lunarYear, lunarMonth, lunarDay, isLeap };
}

function getLunarDateString(date) {
  const { lunarYear, lunarMonth, lunarDay, isLeap } = solarToLunar(
    date.getFullYear(), date.getMonth() + 1, date.getDate()
  );
  const monthName = isLeap ? `윤${LUNAR_MONTH_NAMES[lunarMonth]}` : LUNAR_MONTH_NAMES[lunarMonth];
  const dayName = LUNAR_DAY_NAMES[lunarDay] || `${lunarDay}일`;
  return `${monthName} ${dayName}`;
}

function getLunarDay(date) {
  const { lunarDay } = solarToLunar(
    date.getFullYear(), date.getMonth() + 1, date.getDate()
  );
  return LUNAR_DAY_NAMES[lunarDay] || `${lunarDay}일`;
}

const STEM = ["갑","을","병","정","무","기","경","신","임","계"];
const BRANCH = ["자","축","인","묘","진","사","오","미","신","유","술","해"];

const GANJI_60 = [
  "갑자","을축","병인","정묘","무진","기사","경오","신미","임신","계유",
  "갑술","을해","병자","정축","무인","기묘","경진","신사","임오","계미",
  "갑신","을유","병술","정해","무자","기축","경인","신묘","임진","계사",
  "갑오","을미","병신","정유","무술","기해","경자","신축","임인","계묘",
  "갑진","을사","병오","정미","무신","기유","경술","신해","임자","계축",
  "갑인","을묘","병진","정사","무오","기미","경신","신유","임술","계해"
];

function getYearGanji(y){
  if(y==null || typeof y!=='number') return "??";
  const index = ((y-4+3600)%60+60)%60;
  if(!GANJI_60 || !GANJI_60[index]) return "??";
  return GANJI_60[index];
}
function getMonthGanji(y,m){
  try {
    const yearGanji = getYearGanji(y);
    if(yearGanji==="??") return "??";
    const yearStemIndex = STEM.indexOf(yearGanji[0]);
    if(yearStemIndex===-1) return "??";
    const monthStemIndex = (yearStemIndex*2+m)%10;
    const monthBranchIndex = (m+1)%12;
    return STEM[monthStemIndex]+BRANCH[monthBranchIndex];
  } catch(e){ return "??"; }
}
function getDayGanji(date){
  if(!date) { console.warn("getDayGanji: date가 null/undefined"); return "??"; }
  const t = date.getTime();
  if(isNaN(t)) { console.warn("getDayGanji: Invalid Date"); return "??"; }
  const epoch = new Date(1900,0,1);
  const diff = Math.floor((t-epoch.getTime())/86400000);
  const index = ((diff+40)%60+60)%60;
  if(!GANJI_60 || !GANJI_60[index]){
    console.warn("getDayGanji: GANJI_60 오류", {index, len: GANJI_60?.length});
    return "??";
  }
  return GANJI_60[index];
}

function getYearGanjiWithAnimal(y){
  const ganji = getYearGanji(y);
  if(ganji==="??") return { ganji:"??", animal:"?" };
  const animals = ["쥐","소","호랑이","토끼","용","뱀","말","양","원숭이","닭","개","돼지"];
  return { ganji, animal: animals[(y-4+6000)%12] };
}

const CHINESE_ERA_NAMES = {
  "洪武":"1368-1398","建文":"1399-1402","永樂":"1403-1424",
  "洪熙":"1425","宣德":"1426-1435","正統":"1436-1449",
  "景泰":"1450-1456","天順":"1457-1464","成化":"1465-1487",
  "弘治":"1488-1505","正德":"1506-1521","嘉靖":"1522-1566",
  "隆慶":"1567-1572","萬曆":"1573-1620","泰昌":"1620",
  "天啟":"1621-1627","崇禎":"1628-1644",
  "順治":"1644-1661","康熙":"1662-1722","雍正":"1723-1735",
  "乾隆":"1736-1795","嘉慶":"1796-1820","道光":"1821-1850",
  "咸豐":"1851-1861","同治":"1862-1874","光緒":"1875-1908","宣統":"1909-1911",
};

function getChineseEra(year){
  for(const [era, range] of Object.entries(CHINESE_ERA_NAMES)){
    const [start, end] = range.split('-').map(Number);
    if(year >= start && year <= (end||start)) return era;
  }
  return null;
}

function getFullYearInfo(year){
  const ganji = getYearGanji(year);
  const king = getKing(year);
  const era = king ? king.name : "조선 이전";
  const chineseEra = getChineseEra(year);
  const { animal } = getYearGanjiWithAnimal(year);
  return {
    ganji, animal, king, era, chineseEra,
    display: `${year}년 (${ganji})${chineseEra?` · ${chineseEra}`:''}${king?` · ${king.name}`:''}`,
  };
}

function getCurrentTradTime(){
  const h = new Date().getHours();
  for(const t of TRAD_TIME){
    if(t.start < t.end){ if(h>=t.start && h<t.end) return t; }
    else { if(h>=t.start || h<t.end) return t; }
  }
  return TRAD_TIME[0];
}

============================================= */
function getHolidays(date) {
  const { lunarMonth, lunarDay } = solarToLunar(
    date.getFullYear(), date.getMonth() + 1, date.getDate()
  );
  const holidays = [];
  
  if (lunarMonth === 1 && lunarDay === 1) holidays.push("설날");
  if (lunarMonth === 1 && lunarDay === 15) holidays.push("정월 대보름");
  if (lunarMonth === 3 && lunarDay === 3) holidays.push("삼짇날");
  if (lunarMonth === 5 && lunarDay === 5) holidays.push("단오");
  if (lunarMonth === 7 && lunarDay === 7) holidays.push("칠석");
  if (lunarMonth === 8 && lunarDay === 15) holidays.push("추석");
  if (lunarMonth === 9 && lunarDay === 9) holidays.push("중양절");
  if (lunarMonth === 12 && lunarDay === 30) holidays.push("섣달그믐");
  
  return holidays;
}

function getKing(year){
  for(const king of KINGS){

    if(year >= start && year <= end) return king;

}

/* =============================================
   달력 렌더
============================================= */
function mkKey(m,d){
  return String(m).padStart(2,"0")+"-"+String(d).padStart(2,"0");
}

function buildCalendar(){
  const grid = $("calGrid");
  grid.innerHTML = "";

  const first = new Date(STATE.year, STATE.month-1, 1);
  const last  = new Date(STATE.year, STATE.month, 0);
  const start = first.getDay();
  const count = last.getDate();
  const today = new Date();
  const isCurrentMonth = today.getFullYear()===STATE.year && today.getMonth()+1===STATE.month;

  for(let i=0;i<start;i++){
    const el = document.createElement("div");
    el.className = "cal-cell empty";
    grid.appendChild(el);
  }

  for(let d=1; d<=count; d++){
    const date = new Date(STATE.year, STATE.month-1, d);
    const dow = date.getDay();
    const key = mkKey(STATE.month, d);
    const termInfo = TERM_MAP[key];
    const termName = SOLAR_TERMS_24[key];
    const holidays = getHolidays(date);
    const lunarDay = getLunarDay(date);

    const cell = document.createElement("div");
    cell.className = "cal-cell";
    if(dow===0) cell.classList.add("c-sun");
    if(dow===6) cell.classList.add("c-sat");
    if(isCurrentMonth && today.getDate()===d) cell.classList.add("today");
    if(termName) cell.classList.add("has-term");
    if(STATE.selected && STATE.selected.getFullYear()===STATE.year &&
       STATE.selected.getMonth()+1===STATE.month && STATE.selected.getDate()===d){
      cell.classList.add("selected");
    }

    const ganji = getDayGanji(date);
    const season = getSeason(STATE.month);
    const weatherEmojis = {봄:"🌸", 여름:"☀️", 가을:"🍁", 겨울:"❄️"};

    let html = `
      <div class="c-num">${d}</div>
      <div class="c-lunar">${lunarDay}</div>
      <div class="c-ganji">${ganji}</div>
      ${termName ? `<div class="c-term">${termName}</div>` : ""}
      ${termInfo && !termName ? `<div class="c-hou">${termInfo.emoji} ${termInfo.hou}</div>` : ""}
      ${holidays.length > 0 ? `<div class="c-event">${holidays[0]}</div>` : ""}
      <div class="c-weather">${weatherEmojis[season]}</div>
    `;

    cell.innerHTML = html;

    cell.addEventListener("click", ()=>{
      STATE.selected = date;
      buildCalendar();
      showDateDetail(date);
    });

    grid.appendChild(cell);
  }

  const season = getSeason(STATE.month);
  const badge = $("seasonBadge");
  badge.className = "season-badge season-"+season;
  badge.textContent = season;

  // 간지 + 띠 표시
  let yearInfoEl = document.querySelector('.year-info');
  if(!yearInfoEl){
    yearInfoEl = document.createElement('span');
    yearInfoEl.className = 'year-info';
    yearInfoEl.style.cssText = 'font-size:11px;color:var(--accent-dim);margin-left:8px;';
    badge.parentNode.insertBefore(yearInfoEl, badge);
  }
  const info = getYearGanjiWithAnimal(STATE.year);
  yearInfoEl.textContent = `· ${info.ganji} (${info.animal}띠)`;
}

/* =============================================
   통합 검색 (개선)
============================================= */
function doSearch(keyword, categoryKey){
  const kw = keyword.trim().toLowerCase();
  const results = $("searchResults");
  const count = $("searchCount");
  results.innerHTML = "";
  
  if(!kw && !categoryKey){ 
    count.textContent = "";
    return; 
  }

  const all = [];
  const searchFields = ["name", "title", "desc", "text", "label"];
  const dataLookup = {
    provinces: PROVINCES,
    weather: WEATHER_PATTERNS,
  };

  // 모든 카테고리에서 검색
  for(const cat of DICT_CATEGORIES){
    // 특정 카테고리만 필터링
    if(categoryKey && cat.key !== categoryKey) continue;
    
    let source = dataLookup[cat.key] || DB[cat.key];
    
    // WEATHER_PATTERNS는 중첩 객체이므로 평탄화
    let items = source;
    if(cat.key === "weather" && !Array.isArray(source)){
      items = [];
      for(const season of Object.keys(source)){
        for(const w of source[season]){
          items.push({name: w.desc, desc: w.detail, emoji: w.emoji, season: season});
        }
      }
    }
    
    for(const item of items){
      // 카테고리 직접 선택 시 키워드 없이 전체 출력
      const match = categoryKey ? true : searchFields.some(field => {
        const val = item[field];
        return val && String(val).toLowerCase().includes(kw);
      });
      if(match){
        all.push({category: cat.label.replace(/[^\w\s]/g, '').trim(), ...item});
      }
    }
  }

  // 절기 검색 (키워드 있을 때만)
  if(!categoryKey && kw){
    for(const d of TERM_DATA){
      const text = JSON.stringify(d).toLowerCase();
      if(text.includes(kw)){
        all.push({category:"절기·72후", name: d.term, desc: `${d.solar} ${d.hou} (${d.houPhase}) — ${d.rhythm}`});
      }
    }
  }

  count.textContent = `검색 결과: ${all.length}개`;

  if(all.length===0){
    results.innerHTML = `<div class="search-result-item"><div class="r-desc">검색 결과가 없습니다.</div></div>`;
    return;
  }

  for(const item of all.slice(0,30)){
    const el = document.createElement("div");
    el.className = "search-result-item";
    const name = item.name || item.title || "";
    const desc = item.desc || item.text || "";
    el.innerHTML = `
      <div class="r-name">${name} <span class="r-cat">${item.category||""}</span></div>
      <div class="r-desc">${desc}</div>
    `;
    results.appendChild(el);
  }
}

  const expr = randItem(DB.expressions);
  const style = Math.random()<0.5 ? randItem(STYLE_HISTORY) : randItem(STYLE_WUXIA);
  const seasonSent = randItem(SEASON_SENT[season]);
  const time = getCurrentTradTime();

  const lines = [
    `🌙 ${seasonSent}`,
    "",
    nature ? `${nature.name}이(가) 풍경에 생기를 더했다.` : "",
    "",
    `⏰ ${time.name} (${time.detail}), ${time.modern}`,
    "",
    style,
    "",
    expr ? `「${expr.text}」` : "",
    "",
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일, ${getLunarDateString(now)}`,
  ];

  $("exprContent").textContent = lines.filter(l => l !== undefined && l !== null && l !== "").join("\n");
}

/* =============================================
   시각 표시
============================================= */
function updateClock(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2,"0");
  const min = String(now.getMinutes()).padStart(2,"0");
  const s = String(now.getSeconds()).padStart(2,"0");
  $("timeNow").textContent = `${h}:${min}:${s}`;
  $("timeDate").textContent = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,"0")}.${String(now.getDate()).padStart(2,"0")}`;
  const tt = getCurrentTradTime();
  if(tt) $("timeTrad").textContent = `${tt.name} (${tt.detail})`;
}

/* =============================================
   저장 / 로드
============================================= */
const SAVE_KEY = "sageukcalendar_v3";
function save(){
  const saveData = {
    state: {
      year: STATE.year,
      month: STATE.month,
      selected: STATE.selected ? STATE.selected.toISOString() : null
    },
    title: $("novelTitle").value,
    era: $("eraName").value,
    country: $("countryName").value,
    memo: $("memo").value,
    theme: localStorage.getItem('theme') || 'classic'
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
}
function loadSave(){
  const raw = localStorage.getItem(SAVE_KEY);
  if(!raw) return;
  try{
    const obj = JSON.parse(raw);
    if(obj.state){ 
      STATE.year = obj.state.year || new Date().getFullYear();
      STATE.month = obj.state.month || new Date().getMonth()+1;
      if(obj.state.selected){
        STATE.selected = new Date(obj.state.selected);
      }
    }
    if(obj.title) $("novelTitle").value = obj.title;
    if(obj.era) $("eraName").value = obj.era;
    if(obj.country) $("countryName").value = obj.country;
    if(obj.memo) $("memo").value = obj.memo;
    if(obj.theme) changeTheme(obj.theme);
  } catch(e){ console.warn("Load save error:", e); }
}

/* =============================================
   내보내기 / 공유
============================================= */
function exportMemo(){
  const memo = $("memo").value;
  const title = $("novelTitle").value || "제목없음";
  const now = new Date();
  const content = `📜 ${title}\n${now.toLocaleString()}\n${'='.repeat(30)}\n\n${memo}`;
  
  const blob = new Blob([content], {type: "text/plain;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `메모_${now.toISOString().slice(0,10)}.txt`;
  a.click();
}

function shareMemo(){
  if(navigator.share){
    navigator.share({
      title: $("novelTitle").value || "사극 메모",
      text: $("memo").value
    });
  } else {
    alert("공유 기능을 지원하지 않는 브라우저입니다.");
  }
}

/* =============================================
   테마 변경
============================================= */
const THEMES = {
  classic: { bg: "#0f1117", accent: "#c8a35a", panel: "#181c24", panel2: "#1e2330", border: "#2e3545", text: "#dde3ef", sub: "#8a93a8" },
  warm: { bg: "#1a1410", accent: "#d4a373", panel: "#231a15", panel2: "#2d221a", border: "#3d2d20", text: "#f5e6d3", sub: "#b8956f" },
  cool: { bg: "#0f172a", accent: "#60a5fa", panel: "#1e293b", panel2: "#263248", border: "#334155", text: "#e2e8f0", sub: "#94a3b8" },
  dark: { bg: "#000000", accent: "#a855f7", panel: "#0a0a0a", panel2: "#151515", border: "#2a2a2a", text: "#e5e5e5", sub: "#888888" },
};

function changeTheme(themeName){
  const theme = THEMES[themeName];
  if(!theme) return;
  const root = document.documentElement;
  root.style.setProperty('--bg', theme.bg);
  root.style.setProperty('--accent', theme.accent);
  root.style.setProperty('--panel', theme.panel);
  root.style.setProperty('--panel2', theme.panel2);
  root.style.setProperty('--border', theme.border);
  root.style.setProperty('--text', theme.text);
  root.style.setProperty('--sub', theme.sub);
  localStorage.setItem('theme', themeName);
  updateSeasonBackground();
}

function updateSeasonBackground(){
  const season = getSeason(STATE.month);
  const body = document.body;
  body.classList.remove('season-봄','season-여름','season-가을','season-겨울');
  body.classList.add('season-'+season);
}

/* =============================================
   북마크
============================================= */
const BOOKMARKS_KEY = "sageuk_bookmarks";
function getBookmarks(){
  return JSON.parse(localStorage.getItem(BOOKMARKS_KEY) || '[]');
}
function toggleBookmark(date){
  const bookmarks = getBookmarks();
  const key = date.toISOString().slice(0,10);
  const idx = bookmarks.indexOf(key);
  if(idx > -1) bookmarks.splice(idx, 1);
  else bookmarks.push(key);
  localStorage.setItem(BOOKMARKS_KEY, JSON.stringify(bookmarks));
  buildCalendar();
}
function isBookmarked(date){
  return getBookmarks().includes(date.toISOString().slice(0,10));
}

/* =============================================
   초기화
============================================= */
function init(){
  // 테마 로드
  const savedTheme = localStorage.getItem('theme') || 'classic';
  changeTheme(savedTheme);
  // theme selector value 동기화
  setTimeout(() => { $("themeSelect").value = savedTheme; }, 0);

  loadSave();
  buildYearSelect();
  buildMonthSelect();
  buildDictTags();
  buildCalendar();
  generateExpression();
  updateClock();
  setInterval(updateClock, 1000);
  updateSeasonBackground();

  // 이벤트
  $("yearSelect").addEventListener("change", ()=>{
    STATE.year = parseInt($("yearSelect").value);
    buildCalendar(); 
    if(STATE.selected) showDateDetail(STATE.selected);
    save();
  });
  $("monthSelect").addEventListener("change", ()=>{
    STATE.month = parseInt($("monthSelect").value);
    buildCalendar(); 
    if(STATE.selected) showDateDetail(STATE.selected);
    save();
  });
  $("prevMonth").addEventListener("click", ()=>{
    STATE.month--;
    if(STATE.month < 1){ STATE.month = 12; STATE.year--; }
    buildYearSelect();
    buildMonthSelect();
    buildCalendar();
    if(STATE.selected) showDateDetail(STATE.selected);
    save();
  });
  $("nextMonth").addEventListener("click", ()=>{
    STATE.month++;
    if(STATE.month > 12){ STATE.month = 1; STATE.year++; }
    buildYearSelect();
    buildMonthSelect();
    buildCalendar();
    if(STATE.selected) showDateDetail(STATE.selected);
    save();
  });
  $("prevYear").addEventListener("click", ()=>{
    STATE.year--;
    buildYearSelect();
    buildMonthSelect();
    buildCalendar();
    if(STATE.selected) showDateDetail(STATE.selected);
    save();
  });
  $("nextYear").addEventListener("click", ()=>{
    STATE.year++;
    buildYearSelect();
    buildMonthSelect();
    buildCalendar();
    if(STATE.selected) showDateDetail(STATE.selected);
    save();
  });
  $("todayBtn").addEventListener("click", ()=>{
    const now = new Date();
    STATE.year = now.getFullYear();
    STATE.month = now.getMonth()+1;
    STATE.selected = now;
    buildYearSelect();
    buildMonthSelect();
    buildCalendar();
    showDateDetail(now);
    save();
  });
  $("searchBox").addEventListener("input", e=>{
    document.querySelectorAll(".dict-tag").forEach(t=>t.classList.remove("active"));
    doSearch(e.target.value);
  });
  $("genBtn").addEventListener("click", generateExpression);
  $("exportBtn").addEventListener("click", exportMemo);
  $("shareBtn").addEventListener("click", shareMemo);
  $("themeSelect").addEventListener("change", e => changeTheme(e.target.value));
  ["novelTitle","eraName","countryName","memo"].forEach(id=>{
    $(id).addEventListener("input", save);
  });

  // 메모 글자 수/통계 표시
  function updateMemoStats(){
    const memo = $("memo").value;
    const chars = memo.length;
    const words = memo.split(/\s+/).filter(w => w.length > 0).length;
    const lines = memo.split('\n').length;
    $("memoCount").textContent = chars + "자";
    $("memoStats").textContent = `총 ${chars}자 · ${words}단어 · ${lines}줄`;
  }
  $("memo").addEventListener("input", function(){
    updateMemoStats();
    save();
  });
  updateMemoStats();

  if(STATE.selected){
    showDateDetail(new Date(STATE.selected));
  }

  // 키보드 단축키
  document.addEventListener('keydown', (e) => {
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
    
    switch(e.key) {
      case 'ArrowLeft': // 이전 달
        STATE.month--;
        if(STATE.month < 1){ STATE.month = 12; STATE.year--; }
        buildYearSelect(); buildMonthSelect(); buildCalendar();
        if(STATE.selected) showDateDetail(STATE.selected); save();
        break;
      case 'ArrowRight': // 다음 달
        STATE.month++;
        if(STATE.month > 12){ STATE.month = 1; STATE.year++; }
        buildYearSelect(); buildMonthSelect(); buildCalendar();
        if(STATE.selected) showDateDetail(STATE.selected); save();
        break;
      case 'ArrowUp': // 이전 연도
        STATE.year--;
        buildYearSelect(); buildMonthSelect(); buildCalendar();
        if(STATE.selected) showDateDetail(STATE.selected); save();
        break;
      case 'ArrowDown': // 다음 연도
        STATE.year++;
        buildYearSelect(); buildMonthSelect(); buildCalendar();
        if(STATE.selected) showDateDetail(STATE.selected); save();
        break;
      case 't': // 오늘
      case 'T':
        const now = new Date();
        STATE.year = now.getFullYear();
        STATE.month = now.getMonth()+1;
        STATE.selected = now;
        buildYearSelect(); buildMonthSelect(); buildCalendar();
        showDateDetail(now); save();
        break;
      case 'g': // 문장 생성
      case 'G':
        generateExpression();
        break;
      case 's': // 검색창 포커스
      case 'S':
        $("searchBox").focus();
        break;
      case 'e': // 내보내기
      case 'E':
        exportMemo();
        break;
    }
  });
}

window.addEventListener("beforeunload", save);

// 페이지 로드 후 실행
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
