<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사극 창작 달력</title>
<style>
:root {
  --bg: #0f1117;
  --panel: #181c24;
  --panel2: #1e2330;
  --border: #2e3545;
  --text: #dde3ef;
  --sub: #8a93a8;
  --accent: #c8a35a;
  --accent-dim: #8a6e35;
  --spring: #6dab7a;
  --summer: #e07a5f;
  --autumn: #e09f3e;
  --winter: #6a9ec5;
  --radius: 10px;
  --font: "맑은 고딕", "Malgun Gothic", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; overflow: hidden; }
button, input, select, textarea { font: inherit; }
button { cursor: pointer; }

/* ── 레이아웃 ── */
#app {
  display: grid;
  grid-template-columns: 260px 1fr 320px;
  grid-template-rows: 100vh;
  height: 100vh;
}
.left-panel { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.main-area { overflow-y: auto; display: flex; flex-direction: column; }
.right-panel { background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

/* ── 스크롤바 ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #3a4255; border-radius: 3px; }

/* ── 왼쪽 패널 ── */
.left-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.app-title {
  font-size: 16px;
  font-weight: bold;
  color: var(--accent);
  letter-spacing: 2px;
  margin-bottom: 12px;
}
.project-inputs { display: flex; flex-direction: column; gap: 6px; }
.project-inputs input {
  background: #0d1018;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 13px;
  width: 100%;
}
.project-inputs input::placeholder { color: var(--sub); }
.project-inputs input:focus { outline: none; border-color: var(--accent-dim); }

.left-body { flex: 1; overflow-y: auto; }

.search-wrap { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.search-wrap input {
  background: #0d1018;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 13px;
  width: 100%;
}
.search-wrap input::placeholder { color: var(--sub); }
.search-wrap input:focus { outline: none; border-color: var(--accent-dim); }

.dict-section { padding: 12px 16px; }
.dict-label { font-size: 11px; color: var(--sub); letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase; }
.dict-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.dict-tag {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 12px;
  color: var(--sub);
  cursor: pointer;
  transition: all 0.15s;
}
.dict-tag:hover { border-color: var(--accent-dim); color: var(--accent); }
.dict-tag.active { background: var(--accent-dim); border-color: var(--accent); color: #fff; }

.search-results { padding: 0 16px 16px; }
.search-result-item {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 8px;
  font-size: 12px;
  line-height: 1.6;
}
.search-result-item .r-name { color: var(--accent); font-weight: bold; margin-bottom: 3px; }
.search-result-item .r-desc { color: var(--sub); }

/* ── 메인: 달력 ── */
.cal-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  background: var(--panel);
  position: sticky;
  top: 0;
  z-index: 10;
}
.cal-nav {
  display: flex;
  align-items: center;
  gap: 8px;
}
.cal-nav select {
  background: #0d1018;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 8px;
  font-size: 14px;
}
.cal-nav select:focus { outline: none; border-color: var(--accent-dim); }
.btn-today {
  background: var(--panel2);
  color: var(--sub);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 12px;
  margin-left: 4px;
  transition: all 0.15s;
}
.btn-today:hover { border-color: var(--accent-dim); color: var(--accent); }

.season-badge {
  margin-left: auto;
  font-size: 12px;
  color: var(--sub);
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
}
.season-봄 { color: var(--spring); border-color: var(--spring); }
.season-여름 { color: var(--summer); border-color: var(--summer); }
.season-가을 { color: var(--autumn); border-color: var(--autumn); }
.season-겨울 { color: var(--winter); border-color: var(--winter); }

/* ── 달력 그리드 ── */
.cal-body { padding: 16px 20px 20px; flex: 1; }

.cal-week-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-bottom: 4px;
}
.cal-week-header div {
  text-align: center;
  font-size: 11px;
  color: var(--sub);
  padding: 6px;
  font-weight: bold;
  letter-spacing: 1px;
}
.cal-week-header div:first-child { color: #e07a6f; }
.cal-week-header div:last-child { color: #6a9ec5; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.cal-cell {
  min-height: 90px;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  gap: 2px;
  position: relative;
  overflow: hidden;
}
.cal-cell:hover { border-color: var(--accent-dim); background: #232840; }
.cal-cell.selected { border-color: var(--accent); background: #2a2d1a; }
.cal-cell.empty { background: transparent; border-color: transparent; cursor: default; }
.cal-cell.today .c-num { background: var(--accent); color: #000; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
.cal-cell.has-term { border-color: var(--accent-dim); }

.c-num { font-size: 13px; font-weight: bold; color: var(--text); line-height: 1; margin-bottom: 2px; }
.c-sun .c-num { color: #e07a6f; }
.c-sat .c-num { color: #6a9ec5; }

.c-lunar { font-size: 10px; color: #7ab0e0; }
.c-ganji { font-size: 10px; color: var(--accent-dim); }
.c-term {
  font-size: 10px;
  font-weight: bold;
  color: var(--accent);
  background: rgba(200,163,90,0.15);
  padding: 1px 4px;
  border-radius: 4px;
  margin-top: 1px;
}
.c-hou { font-size: 10px; color: var(--spring); }
.c-event { font-size: 10px; color: #e07a5f; font-weight: bold; }

/* ── 오른쪽 패널 ── */
.right-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
}
.right-title { font-size: 13px; color: var(--accent); font-weight: bold; letter-spacing: 1px; }

.right-body { flex: 1; overflow-y: auto; padding: 16px; }

/* 날짜 상세 */
.date-detail { margin-bottom: 16px; }
.date-big {
  font-size: 20px;
  font-weight: bold;
  color: var(--text);
  margin-bottom: 4px;
}
.date-sub { font-size: 13px; color: var(--sub); }

.info-block {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 10px;
}
.info-block-title {
  font-size: 10px;
  color: var(--sub);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.info-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 13px;
  line-height: 1.5;
}
.info-label { color: var(--sub); min-width: 36px; flex-shrink: 0; }
.info-val { color: var(--text); }
.info-val.accent { color: var(--accent); font-weight: bold; }
.info-val.blue { color: #7ab0e0; }
.info-val.green { color: var(--spring); }

.rhythm-box {
  background: #0d1018;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 10px;
  font-size: 12px;
  line-height: 1.7;
  color: #b0bac8;
}
.rhythm-box .emoji { font-size: 16px; margin-bottom: 6px; display: block; }
.rhythm-box .rhythm-term { color: var(--accent); font-weight: bold; margin-bottom: 4px; }
.rhythm-box .rhythm-desc { color: var(--sub); }

/* 메모 */
.memo-section { border-top: 1px solid var(--border); padding: 14px 16px; flex-shrink: 0; }
.memo-label { font-size: 11px; color: var(--sub); margin-bottom: 6px; letter-spacing: 1px; }
.memo-section textarea {
  width: 100%;
  background: #0d1018;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  font-size: 12px;
  resize: none;
  height: 90px;
  line-height: 1.6;
}
.memo-section textarea:focus { outline: none; border-color: var(--accent-dim); }

/* 표현 생성 */
.expr-section { border-top: 1px solid var(--border); padding: 14px 16px; flex-shrink: 0; }
.expr-label { font-size: 11px; color: var(--sub); margin-bottom: 8px; letter-spacing: 1px; display: flex; justify-content: space-between; }
.btn-gen {
  background: var(--accent-dim);
  color: #fff;
  border: none;
  border-radius: 5px;
  padding: 2px 8px;
  font-size: 11px;
}
.expr-content {
  font-size: 12px;
  line-height: 1.7;
  color: #b0bac8;
  min-height: 60px;
}

/* ── 선택 없을 때 안내 ── */
.no-select {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--sub);
  font-size: 13px;
  gap: 8px;
}
.no-select span { font-size: 28px; }

/* ── 현재 시각 ── */
.time-bar {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  font-size: 12px;
}
.time-now { color: var(--text); }
.time-trad { color: var(--accent); }
</style>
</head>
<body>
<div id="app">

<!-- ── 왼쪽 ── -->
<div class="left-panel">
  <div class="left-header">
    <div class="app-title">사극 창작 달력</div>
    <div class="project-inputs">
      <input id="novelTitle" placeholder="작품명">
      <input id="eraName" placeholder="시대">
      <input id="countryName" placeholder="국가 / 배경">
    </div>
  </div>

  <div class="search-wrap">
    <input id="searchBox" placeholder="관직 · 화폐 · 음식 · 절기 · 표현 검색…">
  </div>

  <div class="left-body">
    <div class="dict-section">
      <div class="dict-label">자료 사전</div>
      <div class="dict-tags" id="dictTags"></div>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<!-- ── 메인: 달력 ── -->
<div class="main-area">
  <div class="cal-header">
    <div class="cal-nav">
      <select id="yearSelect"></select>
      <select id="monthSelect"></select>
      <button class="btn-today" id="todayBtn">오늘</button>
    </div>
    <div class="season-badge" id="seasonBadge"></div>
  </div>
  <div class="cal-body">
    <div class="cal-week-header">
      <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<!-- ── 오른쪽 ── -->
<div class="right-panel">
  <div class="time-bar">
    <span class="time-now" id="timeNow">--:--:--</span>
    <span>·</span>
    <span class="time-trad" id="timeTrad"></span>
  </div>

  <div class="right-header">
    <div class="right-title" id="rightTitle">날짜 정보</div>
  </div>

  <div class="right-body" id="rightBody">
    <div class="no-select">
      <span>📅</span>
      달력에서 날짜를 선택하세요
    </div>
  </div>

  <div class="expr-section">
    <div class="expr-label">
      <span>문장 생성</span>
      <button class="btn-gen" id="genBtn">새로 생성</button>
    </div>
    <div class="expr-content" id="exprContent"></div>
  </div>

  <div class="memo-section">
    <div class="memo-label">창작 메모</div>
    <textarea id="memo" placeholder="장면, 대사, 아이디어…"></textarea>
  </div>
</div>

</div>

/* =============================================
   간지 계산
============================================= */
const STEM = ["갑","을","병","정","무","기","경","신","임","계"];
const BRANCH = ["자","축","인","묘","진","사","오","미","신","유","술","해"];
const GANJI_60 = [];
for(let i=0;i<60;i++) GANJI_60.push(STEM[i%10]+BRANCH[i%12]);

function getYearGanji(y){ return GANJI_60[(y-4+3600)%60]; }
function getMonthGanji(y,m){ return GANJI_60[((y*12)+m+3600)%60]; }
function getDayGanji(date){
  const epoch = new Date(1900,0,1);
  const diff = Math.floor((date-epoch)/86400000);
  return GANJI_60[(diff+40)%60];
}

function getCurrentTradTime(){
  const h = new Date().getHours();
  for(const t of TRAD_TIME){
    if(t.start < t.end){ if(h>=t.start && h<t.end) return t; }
    else { if(h>=t.start || h<t.end) return t; }
  }
  return null;
}

/* =============================================
   계절 판별
============================================= */
function getSeason(m){
  if(m>=3&&m<=5) return "봄";
  if(m>=6&&m<=8) return "여름";
  if(m>=9&&m<=11) return "가을";
  return "겨울";
}

/* =============================================
   STATE
============================================= */
const STATE = {
  year: new Date().getFullYear(),
  month: new Date().getMonth()+1,
  selected: null,
};

function $(id){ return document.getElementById(id); }

/* =============================================
   달력 렌더
============================================= */
function mkKey(m,d){
  return String(m).padStart(2,"0")+"-"+String(d).padStart(2,"0");
}

function buildCalendar(){
  const grid = $("calGrid");
  grid.innerHTML = "";

  const first = new Date(STATE.year, STATE.month-1, 1);
  const last  = new Date(STATE.year, STATE.month, 0);
  const start = first.getDay();
  const count = last.getDate();
  const today = new Date();
  const isCurrentMonth = today.getFullYear()===STATE.year && today.getMonth()+1===STATE.month;

  // 빈 칸
  for(let i=0;i<start;i++){
    const el = document.createElement("div");
    el.className = "cal-cell empty";
    grid.appendChild(el);
  }

  for(let d=1; d<=count; d++){
    const date = new Date(STATE.year, STATE.month-1, d);
    const dow = date.getDay();
    const key = mkKey(STATE.month, d);
    const termInfo = TERM_MAP[key];
    const termName = SOLAR_TERMS_24[key];
    const folkEvent = FOLK_EVENTS[key];

    const cell = document.createElement("div");
    cell.className = "cal-cell";
    if(dow===0) cell.classList.add("c-sun");
    if(dow===6) cell.classList.add("c-sat");
    if(isCurrentMonth && today.getDate()===d) cell.classList.add("today");
    if(termName) cell.classList.add("has-term");
    if(STATE.selected && STATE.selected.getFullYear()===STATE.year &&
       STATE.selected.getMonth()+1===STATE.month && STATE.selected.getDate()===d){
      cell.classList.add("selected");
    }

    const lunar = fakeLunar(d);
    const ganji = getDayGanji(date);

    cell.innerHTML = `
      <div class="c-num">${d}</div>
      <div class="c-lunar">${lunar}</div>
      <div class="c-ganji">${ganji}</div>
      ${termName ? `<div class="c-term">☀️ ${termName}</div>` : ""}
      ${termInfo && !termName ? `<div class="c-hou">${termInfo.emoji} ${termInfo.hou}</div>` : ""}
      ${folkEvent ? `<div class="c-event">${folkEvent}</div>` : ""}
    `;

    cell.addEventListener("click", ()=>{
      STATE.selected = date;
      buildCalendar();
      showDateDetail(date);
    });

    grid.appendChild(cell);
  }

  // 계절 뱃지
  const season = getSeason(STATE.month);
  const badge = $("seasonBadge");
  badge.className = "season-badge season-"+season;
  badge.textContent = season;
}

/* =============================================
   날짜 상세 패널
============================================= */
function showDateDetail(date){
  const m = date.getMonth()+1;
  const d = date.getDate();
  const y = date.getFullYear();
  const dow = ["일","월","화","수","목","금","토"][date.getDay()];
  const key = mkKey(m,d);
  const termInfo = TERM_MAP[key];
  const termName = SOLAR_TERMS_24[key];

  $("rightTitle").textContent = `${y}년 ${m}월 ${d}일 ${dow}요일`;

  let html = `
    <div class="date-big">${y}년 ${m}월 ${d}일</div>
    <div class="date-sub">${dow}요일 · ${fakeLunar(d)}</div>
    <br>

    <div class="info-block">
      <div class="info-block-title">날짜 정보</div>
      <div class="info-row"><span class="info-label">음력</span><span class="info-val blue">${fakeLunar(d)}</span></div>
      <div class="info-row"><span class="info-label">일간지</span><span class="info-val accent">${getDayGanji(date)}</span></div>
      <div class="info-row"><span class="info-label">월간지</span><span class="info-val">${getMonthGanji(y,m)}</span></div>
      <div class="info-row"><span class="info-label">년간지</span><span class="info-val">${getYearGanji(y)}</span></div>
      <div class="info-row"><span class="info-label">계절</span><span class="info-val green">${getSeason(m)}</span></div>
    </div>
  `;

  if(termName || termInfo){
    html += `<div class="info-block">
      <div class="info-block-title">절기 · 72후</div>`;
    if(termName){
      html += `<div class="info-row"><span class="info-label">24절기</span><span class="info-val accent">☀️ ${termName} 시작</span></div>`;
    }
    if(termInfo){
      html += `
        <div class="info-row"><span class="info-label">72후</span><span class="info-val">${termInfo.hou}</span></div>
        <div class="info-row"><span class="info-label">단계</span><span class="info-val blue">${termInfo.houPhase}</span></div>
      `;
    }
    html += `</div>`;
  }

  if(termInfo){
    html += `
      <div class="rhythm-box">
        <span class="emoji">${termInfo.emoji}</span>
        <div class="rhythm-term">${termInfo.hou} — ${termInfo.houPhase}</div>
        <div class="rhythm-desc">${termInfo.rhythm}</div>
      </div>
    `;
  } else {
    // 현재 절기 내 날짜인 경우 앞 절기 정보 표시
    let prevInfo = null;
    for(const info of TERM_DATA){
      const [im,id] = info.solar.split("-").map(Number);
      const infoDate = new Date(y,im-1,id);
      if(infoDate <= date) prevInfo = info;
      else break;
    }
    if(prevInfo){
      html += `
        <div class="rhythm-box">
          <span class="emoji">${prevInfo.emoji}</span>
          <div class="rhythm-term">${prevInfo.term} 절기 중</div>
          <div class="rhythm-desc">이 시기의 생활 리듬: ${prevInfo.rhythm}</div>
        </div>
      `;
    }
  }

  $("rightBody").innerHTML = html;
}

/* =============================================
   연·월 선택기
============================================= */
function buildYearSelect(){
  const sel = $("yearSelect");
  sel.innerHTML = "";
  for(let y=1392; y<=1910; y++){
    const op = document.createElement("option");
    op.value = y;
    op.textContent = y+"년";
    if(y === STATE.year) op.selected = true;
    sel.appendChild(op);
  }
}

function buildMonthSelect(){
  const sel = $("monthSelect");
  sel.innerHTML = "";
  for(let i=1; i<=12; i++){
    const op = document.createElement("option");
    op.value = i;
    op.textContent = i+"월";
    if(i === STATE.month) op.selected = true;
    sel.appendChild(op);
  }
}

/* =============================================
   자료사전 태그
============================================= */
const DICT_CATEGORIES = [
  {label:"관직",key:"officials"},
  {label:"신분",key:"status"},
  {label:"화폐",key:"currency"},
  {label:"도량형",key:"measure"},
  {label:"음식",key:"foods"},
  {label:"자연",key:"nature"},
  {label:"표현",key:"expressions"},
  {label:"풍속",key:"culture"},
];

function buildDictTags(){
  const wrap = $("dictTags");
  wrap.innerHTML = "";
  for(const cat of DICT_CATEGORIES){
    const el = document.createElement("span");
    el.className = "dict-tag";
    el.textContent = cat.label;
    el.addEventListener("click", ()=>{
      $("searchBox").value = cat.label;
      doSearch(cat.label);
      document.querySelectorAll(".dict-tag").forEach(t=>t.classList.remove("active"));
      el.classList.add("active");
    });
    wrap.appendChild(el);
  }
}

/* =============================================
   통합 검색
============================================= */
function doSearch(keyword){
  const kw = keyword.trim().toLowerCase();
  const results = $("searchResults");
  results.innerHTML = "";
  if(!kw){ return; }

  const all = [];
  // 카테고리 이름으로 전체 카테고리 표시
  for(const cat of DICT_CATEGORIES){
    if(cat.label === keyword || cat.label.toLowerCase() === kw){
      for(const item of DB[cat.key]){
        all.push({category: cat.label, ...item});
      }
    }
  }
  // 키워드로 전체 검색
  if(all.length===0){
    for(const cat of DICT_CATEGORIES){
      for(const item of DB[cat.key]){
        const text = JSON.stringify(item).toLowerCase();
        if(text.includes(kw)){
          all.push({category: cat.label, ...item});
        }
      }
    }
    // 절기 검색
    for(const d of TERM_DATA){
      const text = JSON.stringify(d).toLowerCase();
      if(text.includes(kw)){
        all.push({category:"절기·72후", name: d.term, desc: `${d.solar} ${d.hou} (${d.houPhase}) — ${d.rhythm}`});
      }
    }
  }

  if(all.length===0){
    results.innerHTML = `<div class="search-result-item"><div class="r-desc">검색 결과가 없습니다.</div></div>`;
    return;
  }

  for(const item of all.slice(0,20)){
    const el = document.createElement("div");
    el.className = "search-result-item";
    el.innerHTML = `<div class="r-name">${item.name||item.title||""} <span style="color:var(--sub);font-size:10px">${item.category||""}</span></div><div class="r-desc">${item.desc||item.text||""}</div>`;
    results.appendChild(el);
  }
}

/* =============================================
   문장 생성
============================================= */

  "새벽 종이 궁궐에 울려 퍼졌다.","궁문이 천천히 열렸다.",
  "신하는 머리를 깊이 숙였다.","교지가 전국에 반포되었다.",
  "금군이 창을 세우고 대기하였다.","조정은 긴장으로 가득하였다.",
  "궁궐의 회랑에는 적막만 흘렀다.","등잔불만이 조용히 흔들렸다.",

const STYLE_WUXIA = [

  "검기가 수십 갈래로 갈라졌다.","내공이 폭풍처럼 소용돌이쳤다.",

  "눈빛만으로도 상대를 압도했다.","옷자락이 바람을 가르며 휘날렸다.",
  "천천히 검을 거두었다.","한 걸음 내딛는 순간 땅이 갈라지는 듯했다.",
];
const SEASON_SENT = {
  봄:"산천에는 연둣빛 기운이 번졌다.",
  여름:"매미 울음이 숲을 가득 메웠다.",
  가을:"들녘에는 황금빛 물결이 일렁였다.",
  겨울:"찬바람이 처마 끝을 스쳐 지나갔다.",
};

function randItem(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function generateExpression(){
  const season = getSeason(new Date().getMonth()+1);
  const nature = randItem(DB.nature);
  const expr = randItem(DB.expressions);
  const hist = randItem(STYLE_HISTORY);
  const style = Math.random()<0.5 ? randItem(STYLE_HISTORY) : randItem(STYLE_WUXIA);

  const lines = [
    SEASON_SENT[season],
    "",
    nature ? `${nature.name}이 풍경을 더욱 깊게 만들었다.` : "",
    "",
    style,
    "",
    expr ? `「${expr.text}」` : "",
  ];

  $("exprContent").textContent = lines.filter(l=>l||l==="").join("\n");
}

/* =============================================
   시각 표시
============================================= */
function updateClock(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2,"0");
  const min = String(now.getMinutes()).padStart(2,"0");
  const s = String(now.getSeconds()).padStart(2,"0");
  $("timeNow").textContent = `${h}:${min}:${s}`;
  const tt = getCurrentTradTime();
  if(tt) $("timeTrad").textContent = `${tt.name} (${tt.modern})`;
}

/* =============================================
   저장 / 로드
============================================= */
const SAVE_KEY = "sageukcalendar_v2";
function save(){
  localStorage.setItem(SAVE_KEY, JSON.stringify({
    state: STATE,
    title: $("novelTitle").value,
    era: $("eraName").value,
    country: $("countryName").value,
    memo: $("memo").value,
  }));
}
function loadSave(){
  const raw = localStorage.getItem(SAVE_KEY);
  if(!raw) return;
  try{
    const obj = JSON.parse(raw);
    if(obj.state){ Object.assign(STATE, obj.state); }
    if(obj.title) $("novelTitle").value = obj.title;
    if(obj.era) $("eraName").value = obj.era;
    if(obj.country) $("countryName").value = obj.country;
    if(obj.memo) $("memo").value = obj.memo;
  } catch(e){}
}

/* =============================================
   초기화
============================================= */
function init(){
  loadSave();
  buildYearSelect();
  buildMonthSelect();
  buildDictTags();
  buildCalendar();
  generateExpression();
  updateClock();
  setInterval(updateClock, 1000);

  // 이벤트
  $("yearSelect").addEventListener("change", ()=>{
    STATE.year = parseInt($("yearSelect").value);
    buildCalendar(); save();
  });
  $("monthSelect").addEventListener("change", ()=>{
    STATE.month = parseInt($("monthSelect").value);
    buildCalendar(); save();
  });
  $("todayBtn").addEventListener("click", ()=>{
    const now = new Date();
    STATE.year = now.getFullYear();
    STATE.month = now.getMonth()+1;
    buildYearSelect();
    buildMonthSelect();
    buildCalendar();
  });
  $("searchBox").addEventListener("input", e=>{
    document.querySelectorAll(".dict-tag").forEach(t=>t.classList.remove("active"));
    doSearch(e.target.value);
  });
  $("genBtn").addEventListener("click", generateExpression);
  ["novelTitle","eraName","countryName","memo"].forEach(id=>{
    $(id).addEventListener("input", save);
  });

  if(STATE.selected){
    showDateDetail(new Date(STATE.selected));
  }
}

window.addEventListener("beforeunload", save);
init();
</script>
