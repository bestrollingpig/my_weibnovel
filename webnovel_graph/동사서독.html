<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그래프 뷰어</title>
<script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    background:#fafafa; 
    height:100vh; 
    display:flex; 
    flex-direction:column;
    font-family:'Malgun Gothic',sans-serif;
    overflow:hidden;
  }
  #cy { 
    flex:1; 
    width:100%;
    background:#fafafa;
  }
  #info { 
    position:fixed; 
    bottom:20px; 
    left:50%; 
    transform:translateX(-50%);
    background:rgba(0,0,0,0.7); 
    color:#fff; 
    padding:6px 16px; 
    border-radius:20px; 
    font-size:12px; 
    pointer-events:none; 
    z-index:100;
    backdrop-filter:blur(4px);
  }
  #info span { font-weight:bold; color:#FFD700; }
  .header {
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    color:#fff;
    padding:8px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-shrink:0;
  }
  .header h1 { font-size:1em; }
  .header .hint { font-size:0.7em; opacity:0.8; }
  .tip { 
    position:fixed; 
    top:60px; 
    left:50%; 
    transform:translateX(-50%);
    background:rgba(0,0,0,0.5); 
    color:#fff; 
    padding:4px 14px; 
    border-radius:12px; 
    font-size:11px; 
    pointer-events:none; 
    z-index:100;
    backdrop-filter:blur(4px);
    transition: opacity 1s;
  }
  .tip.hidden { opacity:0; }

  /* ===== 툴팁 ===== */
  #nodeTooltip {
    display:none;
    position:fixed;
    z-index:1000;
    pointer-events:none;
    background:#fff;
    border-radius:10px;
    box-shadow:0 8px 30px rgba(0,0,0,0.25);
    max-width:320px;
    padding:10px 14px;
    border:1px solid #ddd;
    font-family:'Malgun Gothic',sans-serif;
    font-size:0.85em;
    line-height:1.5;
    color:#333;
  }
  #nodeTooltip .tt-title {
    font-weight:bold;
    color:#667eea;
    border-bottom:1px solid #eee;
    padding-bottom:3px;
    margin-bottom:4px;
  }
  #nodeTooltip .tt-notes { white-space:pre-wrap; word-break:break-word; }
  #nodeTooltip .tt-empty { color:#999; font-style:italic; }

  .dark-toggle {
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.25);
    color:#fff;
    padding:4px 12px;
    border-radius:16px;
    cursor:pointer;
    font-size:0.7em;
  }
  .dark-toggle:hover { background:rgba(255,255,255,0.3); }
  
  [data-theme="dark"] body { background:#0f0f1a; }
  [data-theme="dark"] #cy { background:#0f0f1a; }
  [data-theme="dark"] #nodeTooltip {
    background:#1a1a2e;
    border-color:#444466;
    color:#e0e0e0;
  }
  [data-theme="dark"] #nodeTooltip .tt-title {
    color:#bb86fc;
    border-color:#444466;
  }
  [data-theme="dark"] #nodeTooltip .tt-empty { color:#888; }
</style>
</head>
<body>
<div class="header">
  <h1>🌐 그래프 뷰어</h1>
  <div>
    <span class="hint">🔍 호버=메모보기 · D키 다크모드</span>
    <button class="dark-toggle" onclick="toggleDark()">🌙</button>
  </div>
</div>
<div id="cy"></div>
<div id="info">📊 <span id="nodeCount">0</span> 노드 · <span id="edgeCount">0</span> 엣지</div>
<div class="tip" id="tip">💡 노드에 마우스를 올리면 메모를 볼 수 있어요</div>

<!-- 툴팁 -->
<div id="nodeTooltip">
  <div class="tt-title" id="ttTitle">노드명</div>
  <div class="tt-notes" id="ttNotes"><span class="tt-empty">메모가 없습니다</span></div>
</div>

<script>
  const data = {
  "nodes": [
    {
      "data": {
        "id": "story_plot",
        "label": "📜 스토리 구조 (Save The Cat)",
        "color": "#ffaa00",
        "notes": "[동사서독(東邪西毒)]\n끝없는 모래바람이 부는 사막 한가운데, 세상과 등진 채 홀로 객잔을 지키는 사내가 있었다. 그의 이름은 구양봉. 돈을 받고 사람을 죽여주는 살인 청부업자 중개인이다. 냉혹하고 철저하게 돈만 밝히는 그에게도 가슴 깊이 묻어둔 비밀이 하나 있었다.\n\"어릴 때부터 나는 자신을 보호하는 법을 알았어. 남에게 거절당하지 않으려면, 가장 좋은 방법은 먼저 남을 거절하는 것임을 알았지.\"\n고향 백타산 시절, 그는 한 여인을 미치도록 사랑했지만 서로의 쓸데없는 자존심 때문에 끝내 사랑한다는 말을 하지 않고 떠났다. 상처받은 여인은 구양봉에게 복수하기 위해 홧김에 그의 친형과 결혼해 버렸고, 졸지에 구양봉은 사랑하는 여인을 형수로 두게 되었다. 어떤 방법으로도 형수와 다시 이어질 수 없음을 알게 된 구양봉은 절망 속에서 무작정 사막으로 도망쳐 스스로를 유배했다.\n그녀 역시 훗날 홀로 남아 눈물 흘리며 뒤늦은 후회를 삼켰다. \"난 내가 이겼다고 생각했어. 그런데 어느 날 거울을 보면서 내가 졌다는 걸 알게 됐지. 내가 가장 아름다웠을 때, 내가 가장 사랑하는 사람이 내 곁에 없었어. 다시 시작할 수 있다면 얼마나 좋을까!\"\n봄마다 사막 객잔으로 그런 구양봉을 찾아오는 유일한 친구가 있었다. 방랑 검객인 황약사였다. 그는 매년 사막으로 와서 구양봉에게 형수의 소식을 전해죽곤 했다. 사실 황약사 역시 구양봉의 형수를 남몰래 깊게 짝사랑하고 있었지만 결코 드러내지 않았다. \"비록 내가 그녀를 매우 좋아하지만, 그녀에게 알리고 싶지 않아. 왜냐하면 얻을 수 없는 것이 영원히 가장 좋은 것임을 알기 때문이지.\" 그저 그녀의 안부를 확인하고, 그 소식을 친구 구양봉에게 전해준다는 핑계로 그녀를 만나고 다시 사막을 찾았던 것이다.\n그러던 어느 봄날, 황약사가 술 한 병을 들고 사막 객잔으로 찾아왔다. 형수가 죽기 전 구양봉에게 전해달라며 남긴 '취생몽사(마시면 과거를 잊는 술)'였다. 황약사는 사실 구양봉에게 취생몽사를 전하기 전에 그 술을 먼저 마셔버린 뒤였다. \"이제 난 모든 기억을 지웠다.\" 황약사는 그렇게 말하고 홀연히 떠나버렸다. 그는 형수가 죽었다는 사실을 끝내 구양봉에게 말하지 않았다. 친구가 떠난 사막에서, 구양봉은 형수를 잊으려 애썼던 과거의 후회와 다시 마주하기 시작했다. \"술과 물의 차이점을 아나? 술은 마시면 몸이 달아오르고 물은 마시면 몸이 차가워지지. 너무 이상한 것들은, 나는 언제나 받아들이기 힘들어. 그래서 이 취생몽사를 나는 계속 마시지 않았어.\"\n그 후, 마음이 부서진 이들이 하나둘 구양봉의 객잔을 찾아와 저마다의 슬픈 흔적을 남겼다. 첫 번째는 남자인지 여자인지 알 수 없는 기묘한 검객, 모용연이었다. 황약사가 농담처럼 던진 말에 마음을 빼앗겨 실연당한 그녀는 상처를 감당하지 못해 자아가 분열되어 버렸다. 황약사를 죽이려는 오빠(모용연)와 그를 사랑하는 여동생(모용언)의 이중 인격 속에서 괴로워하던 모용연은, 어느 비 오는 밤 구양봉의 품에 안겼다. \"만약 어느 날 내가 참지 못하고 너에게 묻는다면, 네가 가장 좋아하는 사람이 누구냐고. 그때는 제발 나를 속여줘. 네 마음이 얼마나 내키지 않든, 제발 말해줘. 네가 가장 좋아하는 사람은 나라고.\" 모용연은 구양봉을 황약사로 착각했고, 구양봉은 그녀를 형수로 착각한 채 두 사람은 서로의 결핍을 채우는 슬픈 밤을 보냈다. 결국 자아분열로 완전히 미쳐버린 그녀는 사막을 떠나 평생 자신의 그림자를 상대로 검을 연습하는 고독한 검객, '독고구패'가 되었다.\n두 번째는 눈이 멀어가는 검객, 맹검사였다. 그의 아내 도화는 맹검사의 친구인 황약사와 불륜을 저질렀고, 배신감에 눈과 마음이 모두 멀어버린 맹검사는 고향의 복사꽃을 마지막으로 보기 위해 돈을 벌려 사막으로 왔다. \"칼놀림이 정말 빠르면, 그 칼맞은 상처로부터 피가 뿜어나올 때, 그 소리가 마치 바람소리처럼 아름답다고.\" 하지만 그는 완전히 실명하기 직전, 마적 떼와의 싸움에서 처절하게 목이 베여 숨을 거두었다. 남편의 죽음을 전해 들은 도화는 그제야 자신이 진정 사랑한 사람이 누구였는지 깨닫고 참회하며 통곡했다. 훗날 구양봉이 그의 고향에 갔을 때 그곳엔 복사꽃이 없었다. 복사꽃이란 가꿀 수 있는 나무가 아니라, 그가 그토록 그리워했던 아내의 이름이었음을 떠날 때야 깨닫게 되었다.\n세 번째는 구양봉과 정반대의 길을 걸은 거지 검객, 홍칠이었다. 한 고아 소녀가 남동생의 복수를 위해 달걀 하나를 들고 찾아왔을 때 구양봉은 돈이 안 된다며 거절했지만, 홍칠은 그 의뢰를 받아들였다. 홍칠은 복수에 성공하지만 손가락 하나를 잃게 되었다. 그러나 그는 깨달았다. 자존심이나 돈보다 소중한 것은 양심과 내 곁의 사람이라는 것을. \"가치 없다고? 하지만 난 통쾌해. 이게 바로 나 자신이니까. 내 검이 예전에 빨랐던 것은 내가 직설적이었기 때문이야. 옳다고 생각하면 그냥 했고, 어떤 대가를 치를지는 절대 생각하지 않았어. 이번에 죽는다고 해도 난 여한이 없소. 달걀 때문에 도와줬고, 달걀은 이미 내가 먹었소.\" 홍칠은 자신을 찾아 사막까지 온 아내의 손을 꼭 잡고 당당하게 사막을 떠나며, 이 지독한 비극 속에서 유일하게 구원받은 영웅 '북개'가 되었다.\n사람들이 떠나고 다시 혼자가 된 사막. 구양봉은 마침내 백타산에서 온 서신을 받고 형수의 죽음을 접하게 되었다. 슬픔과 분노 속에서 그는 황약사가 남겨두고 간 취생몽사를 직접 마셨다. 하지만 술을 마신 구양봉의 눈앞에 나타난 것은 망각이 아니라, 오히려 더욱더 또렷해진 형수의 얼굴이었다. 인간은 기억을 지우려고 발버둥 칠수록 그 기억이 더 선명해진다는 잔인한 진실을 깨달았다.\n\"잊었는지 아닌지 알고 싶으면 알수록, 오히려 더 선명하게 기억나게 되는 법이야. 예전에 누가 말했지. 더 이상 가질 수 없을 때, 네가 할 수 있는 유일한 일은 잊지 않는 것이라고.\"\n다 잊었다던 황약사의 말도 결국 평생 형수를 그리워하며 살겠다는 슬픈 거짓말이었다. 자존심 때문에 사랑을 말하지 못했고, 그 대가로 모든 것을 잃어버렸음을 뼈저리게 후회한 구양봉은 마침내 결단했다. 과거의 미련이 가득 찬 사막의 객잔을 불태워버린 것이다.\n움직이는 건 깃발도 바람도 아닌 결국 사람의 마음이었다. 불타오르는 불길을 뒤로한 채 고향 백타산으로 돌아간 그는, 평생 마음의 문을 닫아걸은 잔인하고 고독한 독종, '서독'이 되었다. 그리고 자신에게 끝내 형수의 죽음을 말하지 않은 친구 황약사와 상극이 되어 강호 속으로 영원히 사라졌다.\n\"몇 년 후, 나는 서독이라는 별명을 얻게 되었다. 누구든 독해질 수 있어, 질투가 무엇인지 겪어보기만 하면 된다. 남들이 나를 어떻게 보든 난 신경 쓰지 않아. 다만 남들이 나보다 더 즐거운 게 싫을 뿐이야.\"\n[소제목 및 인물별 비극 정리]\n구양봉 (서독): 형수에게 사랑을 말하지 않아 망침 (자존심의 비극)\n황약사 (동사): 사랑을 받지 못해 다른 여자들에게 상처를 줌 (짝사랑의 비극)\n맹검사: 사랑을 지키지 못해 이용당하고 허무하게 죽음 (비극적 운명)\n모용연 (독고구패): 사랑에 빠져 미쳐버려 자신을 잃음 (집착의 비극)\n도화: 사랑을 깨닫는 게 너무 늦어서 후회함 (시간의 비극)\n홍칠 (북개): 대가를 바라지 않고 마음이 이끄는 대로 직진하여 유일하게 비극을 극복함 (구원의 서사)\n\"왜 인간은 사랑할 때 솔직하지 못하고, 왜 잃고 나서야 후회하는가?\"\n제일 불쌍한 건 맹검사, 제일 잘 된 건 홍칠.\n무협의 탈을 쓴, 지독하게 아름답고 쓸쓸한 왕가위식 사랑 이야기.\n\n***\n실제 영화에 나오는 대사들\n\n자애인 (구양봉의 형수)\n\n\"난 내가 이겼다고 생각했어. 그런데 어느 날 거울을 보면서 내가 졌다는 걸 알게 됐지. 내가 가장 아름다웠을 때, 내가 가장 사랑하는 사람이 내 곁에 없었어. 다시 시작할 수 있다면 얼마나 좋을까!\"\n\n\n구양봉\n\"예전에 누가 말했지. 더 이상 가질 수 없을 때, 네가 할 수 있는 유일한 일은 잊지 않는 것이라고.\"\n\n황약사\n   \"비록 내가 그녀를 매우 좋아하지만, 그녀에게 알리고 싶지 않아. 왜냐하면 얻을 수 없는 것이 영원히 가장 좋은 것임을 알기 때문이지.\"\n\n모용연\n\"만약 어느 날 내가 참지 못하고 너에게 묻는다면, 네가 가장 좋아하는 사람이 누구냐고. 그때는 제발 나를 속여줘. 네 마음이 얼마나 내키지 않든, 제발 말해줘. 네가 가장 좋아하는 사람은 나라고.\"\n\n황약사\n\"얼마 전에, 나는 한 사람을 만났고, 그녀가 내게 술 한 병을 주었어. 그 술의 이름은 취생몽사라고 했지. 마시면 예전에 했던 어떤 일이든 잊을 수 있다고 하더군.\"\n\n \"그녀가 말하길, 사람의 가장 큰 번뇌는 기억력이 너무 좋다는 거라며, 만약 모든 것을 잊을 수 있다면, 이후의 매일매일이 새로운 시작이 될 테니 그게 얼마나 즐거울 거냐고 하더군.\"\n\n\n구양봉 \n    \"잊었는지 아닌지 알고 싶으면 알수록, 오히려 더 선명하게 기억나게 되는 법이야.\"\n\n \"너무 이상한 것들은, 나는 언제나 받아들이기 힘들어. 그래서 이 취생몽사를 나는 계속 마시지 않았어.\"\n\n구양봉\n\"몇 년 후, 나는 서독이라는 별명을 얻게 되었다. 누구든 독해질 수 있어, 질투가 무엇인지 겪어보기만 하면 된다. 남들이 나를 어떻게 보든 난 신경 쓰지 않아. 다만 남들이 나보다 더 즐거운 게 싫을 뿐이야.\"\n\n구양봉\n \"난 이 세상에 질투심이 없는 사람이 있을 거라 생각했어, 그가 너무 자존심이 강하기 때문이라고.\"\n\n\"나이가 사십이 좀 넘은 것 같군. 이 사십여 년 동안, 분명 꺼내고 싶지 않은 일이나 다시 보고 싶지 않은 사람이 있을 거야...\"\n\n구양봉\n\"살인이 쉬운 일은 아니다. 하지만 먹고살기 위해 많은 사람들이 위험을 무릅쓴다.\"\n\n\n구양봉 \n    \"어릴 때부터 나는 자신을 보호하는 법을 알았어. 남에게 거절당하지 않으려면, 가장 좋은 방법은 먼저 남을 거절하는 것임을 알았지.\"\n\n홍칠\n \"가치 없다고? 하지만 난 통쾌해. 이게 바로 나 자신이니까.\"\n\n \"내 검이 예전에 빨랐던 것은 내가 직설적이었기 때문이야. 옳다고 생각하면 그냥 했고, 어떤 대가를 치를지는 절대 생각하지 않았어.\"\n\n \"이번에 죽는다고 해도 난 여한이 없소. 달걀 때문에 도와줬고, 달걀은 이미 내가 먹었소.\"\n\n\n***\n\n \"움직이는 건 깃발도 바람도 아닌 사람의 마음이다.\"\n\n구양봉\n\"술과 물의 차이점을 아나? 술은 마시면 몸이 달아오르고 물은 마시면 몸이 차가워지지\"\n\n\"기억력이 나쁜 사람은 남의 일에 관여해선 안 된다. 원수까지 잊을 수 있기 때문이다.\"\n\n\n맹인 검사\n\"칼놀림이 정말 빠르면, 그 칼맞은 상처로부터 피가 뿜어나올 때, 그 소리가 마치 바람소리처럼 아름답다고.\"\n\n***\n\n \"복사꽃을 본지 오래되어서 다음해에 그의 고향에 갔다. 하지만 그곳엔 복사꽃이 없었다. 복사꽃은 있지도 않았다는 걸 떠날 때야 깨달았다. 복사꽃이란 그 여자의 이름이었다.\"\n\n>맹검사가 죽기전 고향의 복사꽃이야기를 구양봉에게 한 것은 아내를 지칭하는 말이었음.\n\n\"몇 년 후, 강호에 아주 이상한 검객이 나타났다. 그의 출신을 아는 사람은 아무도 없었고, 다만 그는 자신의 그림자를 상대로 검을 연습하는 것을 좋아한다고 들었다. 그는 아주 특별한 이름을 가졌는데, 바로 독고구패였다.\"\n>모영연 이야기.\n\n",

  const cy = cytoscape({
    container: document.getElementById('cy'),
    elements: data,
    style: [
      { selector: 'node', style: { 
        'label':'data(label)', 
        'background-color':'data(color)',
        'shape':'round-rectangle',
        'width':'label', 'height':30, 'padding':'10px',
        'border-width':2, 'border-color':'#333',
        'text-valign':'center', 'text-halign':'center',
        'color':'#fff', 'font-weight':'bold', 'font-size':14,
        'text-outline-width':2, 'text-outline-color':'#000'
      }},
      { selector: 'edge', style: {
        'label':'data(label)',
        'curve-style':'bezier',
        'line-color':'data(color)',
        'width':2,
        'target-arrow-shape':'triangle',
        'target-arrow-color':'data(color)',
        'font-size':11
      }},
      { selector: 'node:selected', style: { 'border-width':4, 'border-color':'#FFD700' } }
    ],
    layout: { name: 'cose', animate: true, fit: true, padding: 30 }
  });

  // ===== 툴팁 =====
  const tooltip = document.getElementById('nodeTooltip');
  const ttTitle = document.getElementById('ttTitle');
  const ttNotes = document.getElementById('ttNotes');

  function showTooltip(node) {
    if (!node || node.length === 0) return;
    const label = node.data('label') || node.id();
    const notes = node.data('notes') || '';
    ttTitle.textContent = label;
    ttNotes.innerHTML = notes || '<span class="tt-empty">메모가 없습니다</span>';
    const pos = node.renderedPosition();
    const rect = cy.container().getBoundingClientRect();
    let x = rect.left + pos.x - tooltip.offsetWidth / 2;
    let y = rect.top + pos.y - 50 - tooltip.offsetHeight;
    if (x < 10) x = 10;
    if (y < 10) y = rect.top + pos.y + 20;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
    tooltip.style.display = 'block';
  }

  function hideTooltip() { tooltip.style.display = 'none'; }

  cy.on('mouseover', 'node', function(evt) {
    showTooltip(evt.target);
    evt.target.style('border-width', '4px');
    evt.target.style('border-color', '#4facfe');
  });

  cy.on('mouseout', 'node', function(evt) {
    hideTooltip();
    if (!evt.target.selected()) {
      evt.target.style('border-width', '2px');
      evt.target.style('border-color', '#333');
    }
  });

  document.getElementById('nodeCount').textContent = cy.nodes().length;
  document.getElementById('edgeCount').textContent = cy.edges().length;

  setTimeout(() => {
    document.getElementById('tip').classList.add('hidden');
  }, 3000);

  function toggleDark() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('viewerTheme', 'light');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      localStorage.setItem('viewerTheme', 'dark');
    }
  }

  document.addEventListener('keydown', function(e) {
    if ((e.key === 'd' || e.key === 'D') && !e.ctrlKey && !e.metaKey) {
      toggleDark();
    }
    if (e.key === 'Escape') hideTooltip();
  });

  const savedTheme = localStorage.getItem('viewerTheme');
  if (savedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }

  window.addEventListener('resize', function() { cy.fit(30); });
