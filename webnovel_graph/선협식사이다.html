<!DOCTYPE html>
<html lang="ko">
<head>

  <title>세계관 그래프</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Malgun Gothic',sans-serif;
      background:#f0f0f0;
      height:100vh;
      display:flex;
      flex-direction:column;
    }
    header {
      background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      color:#fff;
      padding:10px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-shrink:0;
    }
    header h1 { font-size:1.2em; text-shadow:1px 1px 0 #000; }
    .dark-toggle {
      background:rgba(255,255,255,0.15);
      border:1px solid rgba(255,255,255,0.25);
      color:#fff;
      padding:6px 12px;
      border-radius:20px;
      cursor:pointer;
    }
    .dark-toggle:hover { background:rgba(255,255,255,0.3); }

    .main-container { display:flex; flex:1; overflow:hidden; }
    .left-panel {
      width:220px;
      background:#fff;
      padding:12px;
      overflow-y:auto;
      border-right:2px solid #ddd;
    }
    .graph-area {
      flex:1;
      padding:10px;
      display:flex;
      flex-direction:column;
    }
    .cy-wrapper {
      position:relative;
      flex:1;
      width:100%;
      height:100%;
      border:2px solid #ddd;
      border-radius:8px;
      background:#fafafa;
    }
    #cy {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:transparent;
    }

    .panel-section {
      margin-bottom:12px;
      padding:10px;
      background:#f9f9f9;
      border-radius:6px;
      border:1px solid #e0e0e0;
    }
    .panel-section h3 {
      font-size:0.9em;
      margin-bottom:6px;
      color:#667eea;
      border-bottom:1px solid #667eea;
      padding-bottom:3px;
    }
    input[type="text"] {
      width:100%;
      padding:5px;
      margin:3px 0;
      border:1px solid #ddd;
      border-radius:3px;
      font-size:0.85em;
    }
    input[readonly] {
      background:#e9ecef;
      color:#495057;
      cursor:not-allowed;
    }
    textarea {
      width:100%;
      padding:5px;
      border:1px solid #ddd;
      border-radius:3px;
      font-size:0.85em;
      resize:vertical;
      min-height:60px;
    }
    button {
      width:100%;
      padding:6px;
      margin:3px 0;
      border:none;
      border-radius:3px;
      font-size:0.8em;
      cursor:pointer;
      font-weight:bold;
      color:#fff;
      text-shadow:1px 1px 0 #000;
    }
    button:active { transform:scale(0.97); }
    .btn-primary { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); }
    .btn-success { background:linear-gradient(135deg,#11998e 0%,#38ef7d 100%); }
    .btn-info { background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%); }
    .btn-danger { background:linear-gradient(135deg,#ff5f6d 0%,#ffc371 100%); }

    .help-text { font-size:0.7em; color:#888; margin-top:3px; padding:4px; background:#fff; border-radius:3px; }
    .connection-tools { display:flex; gap:4px; margin-bottom:3px; }
    .connection-tools button { padding:3px; font-size:0.7em; margin:0; }

    .info-badge {
      display:block;
      padding:4px 8px;
      background:#667eea;
      color:#fff;
      border-radius:3px;
      font-size:0.75em;
      margin-bottom:6px;
      text-align:center;
    }
    .notes-display {
      padding:6px;
      background:#fff;
      border:1px solid #ddd;
      border-radius:3px;
      font-size:0.8em;
      min-height:40px;
      white-space:pre-wrap;
      margin-top:4px;
    }
    .file-select-wrapper { display:flex; gap:4px; align-items:center; }
    .file-select-wrapper button { width:auto; padding:4px 8px; margin:0; }
    .file-select-wrapper input[type="file"] { display:none; }

    [data-theme="dark"] {
      background:#0f0f1a;
      color:#e0e0e0;
    }
    [data-theme="dark"] .left-panel {
      background:#1a1a2e;
      border-color:#444466;
    }
    [data-theme="dark"] .panel-section {
      background:#16213e;
      border-color:#444466;
    }
    [data-theme="dark"] input,
    [data-theme="dark"] textarea {
      background:#2d2d4e;
      color:#e0e0e0;
      border-color:#444466;
    }
    [data-theme="dark"] .help-text {
      background:#2d2d4e;
      color:#aaaaaa;
    }
    [data-theme="dark"] .notes-display {
      background:#2d2d4e;
      border-color:#444466;
    }
    [data-theme="dark"] .cy-wrapper {
      background:#1a1a2e;
      border-color:#444466;
    }
  </style>
</head>
<body>
<header>
  <h1>🌐 세계관 그래프</h1>
  <button class="dark-toggle" onclick="toggleDarkMode()">🌙 다크모드</button>
</header>

<div class="main-container">
  <div class="left-panel">
    <div class="panel-section">
      <h3>📂 데이터</h3>
      <div class="file-select-wrapper">
        <input type="file" id="fileInput" accept=".json" onchange="uploadJSON(event)">
        <button class="btn-info" onclick="document.getElementById('fileInput').click()">📂 파일 선택</button>
      </div>
      <button class="btn-success" onclick="downloadJSON()">💾 JSON 다운로드</button>
    </div>

    <div class="panel-section">
      <h3>➕ 노드</h3>
      <input type="text" id="newNode" placeholder="노드 이름">
      <button class="btn-primary" onclick="addNode()">노드 추가</button>
      <div class="help-text">💡 빈 공간 더블클릭</div>
    </div>

    <div class="panel-section">
      <h3>🔗 엣지</h3>
      <div class="connection-tools">
        <button class="btn-info" onclick="clearEdgeInputs()">초기화</button>
        <button class="btn-info" onclick="swapEdgeInputs()">교체</button>
      </div>
      <input type="text" id="edgeSrc" placeholder="출발 노드" readonly style="background:#e3f2fd;">
      <input type="text" id="edgeTgt" placeholder="도착 노드" readonly style="background:#ffebee;">
      <input type="text" id="edgeLbl" placeholder="라벨">
      <button class="btn-primary" onclick="addEdge()">엣지 추가</button>
      <div class="help-text">💡 노드 클릭 시 자동 입력</div>
    </div>

    <div class="panel-section">
      <h3>📝 노드 정보</h3>
      <div class="info-badge" id="nodeInfo">노드를 클릭하세요</div>
      <div class="notes-display" id="nodeNotes">선택한 노드의 메모가 여기에 표시됩니다</div>
      <button class="btn-danger" onclick="deleteSelected()" style="margin-top:4px;">🗑️ 삭제 (Del)</button>
    </div>
  </div>

  <div class="graph-area">
    <div class="cy-wrapper">
      <div id="cy"></div>
    </div>
  </div>
</div>

  let cy = cytoscape({
    container: document.getElementById('cy'),
    elements: initialData,
    style: [
      { selector: 'node', style: { 'label':'data(label)', 'background-color':'data(color)', 'shape':'round-rectangle', 'width':'label', 'height':28, 'padding':'8px', 'border-width':2, 'border-color':'#333', 'text-valign':'center', 'text-halign':'center', 'color':'#fff', 'font-weight':'bold', 'font-size':13, 'text-outline-width':2, 'text-outline-color':'#000' } },
      { selector: 'edge', style: { 'label':'data(label)', 'curve-style':'bezier', 'line-color':'#999', 'width':2, 'target-arrow-shape':'triangle', 'target-arrow-color':'#999', 'font-size':11 } },
      { selector: 'node:selected', style: { 'border-width':4, 'border-color':'#FFD700' } },
      { selector: 'edge:selected', style: { 'width':4, 'line-color':'#FFD700', 'target-arrow-color':'#FFD700' } }
    ],
    layout: { name: 'cose', animate: true }
  });

  let selectedId = null;
  const edgeSrcInput = document.getElementById('edgeSrc');
  const edgeTgtInput = document.getElementById('edgeTgt');
  const nodeInfo = document.getElementById('nodeInfo');
  const nodeNotes = document.getElementById('nodeNotes');

  function addNode() {
    const id = document.getElementById('newNode').value.trim();
    if (!id) { alert('이름을 입력하세요!'); return; }
    if (cy.getElementById(id).length > 0) { alert('이미 존재합니다!'); return; }
    const colors = ['#667eea','#f093fb','#4facfe','#43e97b','#fa709a'];
    cy.add({ data:{ id, label:id, color:colors[Math.floor(Math.random()*colors.length)], notes:"" } });
    cy.layout({ name: 'cose', animate: true, fit: true, padding: 30 }).run();
    document.getElementById('newNode').value='';
  }

  function addEdge() {
    const src=edgeSrcInput.value.trim(), tgt=edgeTgtInput.value.trim(), lbl=document.getElementById('edgeLbl').value.trim();
    if (!src||!tgt) { alert('노드를 선택하세요!'); return; }
    if (cy.getElementById(src).length===0 || cy.getElementById(tgt).length===0) { alert('노드가 없습니다!'); return; }
    cy.add({ data:{ id:src+"_"+tgt+"_"+Date.now(), source:src, target:tgt, label:lbl||"", notes:"" } });
    cy.layout({ name: 'cose', animate: true, fit: true, padding: 30 }).run();
    document.getElementById('edgeLbl').value='';
  }

  function clearEdgeInputs() { edgeSrcInput.value=''; edgeTgtInput.value=''; document.getElementById('edgeLbl').value=''; }
  function swapEdgeInputs() { const t=edgeSrcInput.value; edgeSrcInput.value=edgeTgtInput.value; edgeTgtInput.value=t; }

  function deleteSelected() {
    const selected = cy.$(':selected');
    if (selected.length === 0) { alert('삭제할 요소를 선택하세요.'); return; }
    if (confirm('삭제하시겠습니까?')) {
      cy.remove(selected);
      nodeInfo.textContent = '노드를 클릭하세요';
      nodeNotes.textContent = '선택한 노드의 메모가 여기에 표시됩니다';
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Delete' || e.key === 'Backspace') {
      const tag = document.activeElement.tagName.toUpperCase();
      if (tag !== 'INPUT' && tag !== 'TEXTAREA') {
        deleteSelected();
      }
    }
  });

  cy.on('tap', 'node', function(evt) {
    const node = evt.target;
    const id = node.id();
    
    if (edgeSrcInput.value === '') {
      edgeSrcInput.value = id;
    } else if (edgeTgtInput.value === '' && edgeSrcInput.value !== id) {
      edgeTgtInput.value = id;
    }
    
    nodeInfo.textContent = '📌 ' + (node.data('label') || id);
    nodeNotes.textContent = node.data('notes') || '메모 없음';
    selectedId = id;
  });

  cy.on('tap', function(evt) {
    if (evt.target === cy) {
      nodeInfo.textContent = '노드를 클릭하세요';
      nodeNotes.textContent = '선택한 노드의 메모가 여기에 표시됩니다';
    }
  });

  cy.on('dbltap', function(evt) {
    if (evt.target === cy) {
      const pos = evt.position;
      const name = prompt('새 노드 이름:');
      if (name && name.trim()) {
        const id = name.trim();
        if (cy.getElementById(id).length > 0) { alert('이미 존재합니다!'); return; }
        const colors = ['#667eea','#f093fb','#4facfe','#43e97b','#fa709a'];
        cy.add({ data:{ id, label:id, color:colors[Math.floor(Math.random()*colors.length)], notes:"" }, position:{ x:pos.x, y:pos.y } });
        cy.layout({ name: 'cose', animate: true, fit: true, padding: 30 }).run();
      }
    }
  });

  function downloadJSON() {
    const a = document.createElement('a');
    a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(cy.json().elements, null, 2));
    a.download = "graph_"+new Date().toISOString().slice(0,10)+".json";
    document.body.appendChild(a); a.click(); a.remove();
  }

  function uploadJSON(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        let els = [];
        if (Array.isArray(data)) els = data;
        else if (data.nodes || data.edges) els = [...(data.nodes||[]), ...(data.edges||[])];
        else if (data.elements) els = Array.isArray(data.elements) ? data.elements : [...(data.elements.nodes||[]), ...(data.elements.edges||[])];
        if (els.length) { cy.elements().remove(); cy.add(els); cy.layout({ name: 'cose', animate: true, fit: true, padding: 30 }).run(); alert('성공!'); }
        else alert('데이터 없음');
      } catch(err) { alert('오류: '+err.message); }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  function toggleDarkMode() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme', 'light');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
    }
  }

  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
