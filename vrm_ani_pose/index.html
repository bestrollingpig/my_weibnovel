<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VRM Pose Editor</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;background:#161616;color:#ddd}

#root{display:flex;width:100%;height:100%}
#viewer{flex:1;background:#101010;position:relative}
#sidebar{width:340px;background:#222;border-left:1px solid #444;display:flex;flex-direction:column;flex-shrink:0}

#toolbar{display:flex;flex-wrap:wrap;gap:6px;padding:10px;border-bottom:1px solid #444}
#toolbar button{background:#3b82f6;color:#fff;border:none;border-radius:5px;padding:6px 12px;cursor:pointer;font-size:12px;transition:.2s}
#toolbar button:hover{background:#2563eb}
#toolbar button:disabled{opacity:.4;cursor:not-allowed}
#toolbar button.primary{background:#e94560}
#toolbar button.primary:hover{background:#ff6b81}
#toolbar button.success{background:#2e7d32}
#toolbar button.success:hover{background:#388e3c}

#boneSearch{margin:10px;padding:6px;border:none;border-radius:4px;width:calc(100% - 20px);background:#333;color:#ddd}
#boneSearch::placeholder{color:#666}

#boneList{flex:1;overflow:auto;border-top:1px solid #444}
.bone{padding:8px 12px;cursor:pointer;border-bottom:1px solid #333;font-size:13px;transition:.15s}
.bone:hover{background:#333}
.bone.active{background:#3b82f6}

#editor{border-top:1px solid #444;padding:10px}
#selectedBone{color:#4fc3f7;font-size:13px;margin-bottom:8px;font-weight:500}
.axis{margin-bottom:8px}
.axis label{display:block;margin-bottom:2px;font-size:11px;color:#888}
.axis input{width:100%;height:4px;-webkit-appearance:none;background:#444;border-radius:2px;outline:none}
.axis input::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#3b82f6;border-radius:50%;cursor:pointer}
.axis .value{float:right;font-size:11px;color:#888;font-family:monospace}

#status{position:absolute;left:12px;bottom:12px;background:rgba(0,0,0,.7);padding:6px 12px;border-radius:4px;font-size:12px;z-index:10;pointer-events:none}
#fps{position:absolute;right:12px;bottom:12px;background:rgba(0,0,0,.7);padding:4px 10px;border-radius:4px;font-size:11px;z-index:10;pointer-events:none;color:#666}

#timeline{position:absolute;left:0;right:340px;bottom:0;height:100px;background:#1a1a1a;border-top:1px solid #333;z-index:5}
#timeline .controls{display:flex;gap:6px;padding:6px 10px;align-items:center}
#timeline .controls button{background:#333;color:#ddd;border:none;border-radius:4px;padding:3px 12px;cursor:pointer;font-size:12px;transition:.2s}
#timeline .controls button:hover{background:#444}
#timeline .controls button.primary{background:#3b82f6}
#timeline .controls button.primary:hover{background:#2563eb}
#timeline .controls button.success{background:#2e7d32}
#timeline .controls button.success:hover{background:#388e3c}
#timeline .controls .time-label{font-size:12px;color:#888;font-family:monospace;margin-left:auto}
#timeline canvas{width:100%;height:60px;display:block;cursor:pointer}

#exportPanel{position:absolute;right:12px;top:12px;display:flex;gap:6px;z-index:10}
#exportPanel button{background:#333;color:#ddd;border:none;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:11px;transition:.2s}
#exportPanel button:hover{background:#444}

canvas{display:block}
</style>
</head>
<body>

<div id="root">

<div id="viewer">
<div id="status">Ready</div>
<div id="fps">FPS: 0</div>
<div id="exportPanel">
<button id="exportAnimBtn">📤 Export</button>
<button id="screenshotBtn">📷 PNG</button>
</div>

<div id="timeline">
<div class="controls">
<button id="playBtn" class="primary">▶</button>
<button id="stopBtn">■</button>
<button id="addKeyBtn" class="success">+ Key</button>
<button id="clearKeyBtn">✕ Clear</button>
<span class="time-label" id="timeLabel">0.00s / 5.00s</span>
</div>
<canvas id="timelineCanvas"></canvas>
</div>
</div>

<div id="sidebar">

<div id="toolbar">
<button id="openBtn">📂 Open VRM</button>
<input type="file" id="vrmFile" accept=".vrm" hidden>
<button id="resetBtn">↺ Reset</button>
<button id="savePoseBtn" class="primary">💾 Save</button>
<button id="loadPoseBtn">📂 Load</button>
<input type="file" id="poseFile" accept=".json" hidden>
</div>

<input id="boneSearch" placeholder="🔍 Search Bone...">

<div id="boneList"></div>

<div id="editor">
<div id="selectedBone">No Bone Selected</div>
<div class="axis">
<label>X <span class="value" id="valX">0.0°</span></label>
<input id="rotX" type="range" min="-180" max="180" step="0.5">
</div>
<div class="axis">
<label>Y <span class="value" id="valY">0.0°</span></label>
<input id="rotY" type="range" min="-180" max="180" step="0.5">
</div>
<div class="axis">
<label>Z <span class="value" id="valZ">0.0°</span></label>
<input id="rotZ" type="range" min="-180" max="180" step="0.5">
</div>
</div>

</div>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/",
    "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.3.6/lib/three-vrm.module.js"
  }
}
</script>

<script type="module">
// ============================================================
// IMPORTS
// ============================================================
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

// ============================================================
// DOM REFS
// ============================================================
const viewer = document.getElementById('viewer');
const status = document.getElementById('status');
const fpsLabel = document.getElementById('fps');
const boneList = document.getElementById('boneList');
const boneSearch = document.getElementById('boneSearch');
const selectedLabel = document.getElementById('selectedBone');

const rotX = document.getElementById('rotX');
const rotY = document.getElementById('rotY');
const rotZ = document.getElementById('rotZ');
const valX = document.getElementById('valX');
const valY = document.getElementById('valY');
const valZ = document.getElementById('valZ');

const openBtn = document.getElementById('openBtn');
const vrmInput = document.getElementById('vrmFile');
const resetBtn = document.getElementById('resetBtn');
const savePoseBtn = document.getElementById('savePoseBtn');
const loadPoseBtn = document.getElementById('loadPoseBtn');
const poseInput = document.getElementById('poseFile');

const playBtn = document.getElementById('playBtn');
const stopBtn = document.getElementById('stopBtn');
const addKeyBtn = document.getElementById('addKeyBtn');
const clearKeyBtn = document.getElementById('clearKeyBtn');
const timeLabel = document.getElementById('timeLabel');
const timelineCanvas = document.getElementById('timelineCanvas');
const exportAnimBtn = document.getElementById('exportAnimBtn');
const screenshotBtn = document.getElementById('screenshotBtn');

// ============================================================
// THREE.JS SETUP
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);

const camera = new THREE.PerspectiveCamera(35, viewer.clientWidth / viewer.clientHeight, 0.1, 100);
camera.position.set(0, 1.4, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(viewer.clientWidth, viewer.clientHeight);
viewer.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.enableDamping = true;

// Lights
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
const dir = new THREE.DirectionalLight(0xffffff, 3);
dir.position.set(3, 5, 3);
scene.add(dir);
const dir2 = new THREE.DirectionalLight(0x4488ff, 0.5);
dir2.position.set(-3, 2, -2);
scene.add(dir2);

// Grid
const grid = new THREE.GridHelper(10, 10);
scene.add(grid);

// ============================================================
// VRM LOADER
// ============================================================
const loader = new GLTFLoader();
loader.register((parser) => new VRMLoaderPlugin(parser));

let vrm = null;
let humanoid = null;
let boneMap = new Map();
let selectedBone = null;
let helper = null;

// ============================================================
// BONE LIST
// ============================================================
const BONE_NAMES = [
  'hips', 'spine', 'chest', 'upperChest', 'neck', 'head',
  'leftShoulder', 'leftUpperArm', 'leftLowerArm', 'leftHand',
  'rightShoulder', 'rightUpperArm', 'rightLowerArm', 'rightHand',
  'leftUpperLeg', 'leftLowerLeg', 'leftFoot', 'leftToes',
  'rightUpperLeg', 'rightLowerLeg', 'rightFoot', 'rightToes',
  'leftThumbMetacarpal', 'leftThumbProximal', 'leftThumbDistal',
  'leftIndexProximal', 'leftIndexIntermediate', 'leftIndexDistal',
  'leftMiddleProximal', 'leftMiddleIntermediate', 'leftMiddleDistal',
  'leftRingProximal', 'leftRingIntermediate', 'leftRingDistal',
  'leftLittleProximal', 'leftLittleIntermediate', 'leftLittleDistal',
  'rightThumbMetacarpal', 'rightThumbProximal', 'rightThumbDistal',
  'rightIndexProximal', 'rightIndexIntermediate', 'rightIndexDistal',
  'rightMiddleProximal', 'rightMiddleIntermediate', 'rightMiddleDistal',
  'rightRingProximal', 'rightRingIntermediate', 'rightRingDistal',
  'rightLittleProximal', 'rightLittleIntermediate', 'rightLittleDistal'
];

function buildBoneList() {
  boneMap.clear();
  boneList.innerHTML = '';

  for (const name of BONE_NAMES) {
    const bone = humanoid?.getNormalizedBoneNode(name);
    if (!bone) continue;

    boneMap.set(name, bone);

    const div = document.createElement('div');
    div.className = 'bone';
    div.textContent = name;
    div.dataset.name = name;

    div.onclick = () => {
      document.querySelectorAll('.bone').forEach(el => el.classList.remove('active'));
      div.classList.add('active');
      selectedBone = bone;
      selectedLabel.textContent = name;
      updateSliders();
    };

    boneList.appendChild(div);
  }
}

// ============================================================
// BONE SEARCH
// ============================================================
boneSearch.oninput = () => {
  const keyword = boneSearch.value.toLowerCase();
  document.querySelectorAll('.bone').forEach(el => {
    el.style.display = el.textContent.toLowerCase().includes(keyword) ? '' : 'none';
  });
};

// ============================================================
// SLIDER CONTROLS
// ============================================================
function degToRad(v) { return v * Math.PI / 180; }
function radToDeg(v) { return v * 180 / Math.PI; }

function updateSliders() {
  if (!selectedBone) return;
  const euler = new THREE.Euler().setFromQuaternion(selectedBone.quaternion, 'XYZ');
  rotX.value = radToDeg(euler.x);
  rotY.value = radToDeg(euler.y);
  rotZ.value = radToDeg(euler.z);
  valX.textContent = radToDeg(euler.x).toFixed(1) + '°';
  valY.textContent = radToDeg(euler.y).toFixed(1) + '°';
  valZ.textContent = radToDeg(euler.z).toFixed(1) + '°';
}

function applyRotation() {
  if (!selectedBone) return;
  const euler = new THREE.Euler(
    degToRad(parseFloat(rotX.value)),
    degToRad(parseFloat(rotY.value)),
    degToRad(parseFloat(rotZ.value)),
    'XYZ'
  );
  const quat = new THREE.Quaternion().setFromEuler(euler);
  selectedBone.quaternion.copy(quat);
  updateSliders();
}

rotX.addEventListener('input', applyRotation);
rotY.addEventListener('input', applyRotation);
rotZ.addEventListener('input', applyRotation);

// ============================================================
// CAMERA FIT
// ============================================================
function fitCamera() {
  if (!vrm) return;
  const box = new THREE.Box3().setFromObject(vrm.scene);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const radius = Math.max(size.x, size.y, size.z);
  controls.target.copy(center);
  camera.position.set(center.x, center.y + radius * 0.4, center.z + radius * 2.2);
  camera.near = 0.01;
  camera.far = radius * 20;
  camera.updateProjectionMatrix();
  controls.update();
}

// ============================================================
// SKELETON HELPER
// ============================================================
function buildSkeletonHelper() {
  if (helper) { scene.remove(helper); helper = null; }
  if (!vrm) return;
  helper = new THREE.SkeletonHelper(vrm.scene);
  helper.material.linewidth = 1;
  scene.add(helper);
}

// ============================================================
// POSE FUNCTIONS
// ============================================================
function capturePose() {
  const pose = {};
  for (const [name, bone] of boneMap) {
    pose[name] = {
      x: bone.quaternion.x,
      y: bone.quaternion.y,
      z: bone.quaternion.z,
      w: bone.quaternion.w
    };
  }
  return pose;
}

function applyPose(pose) {
  if (!pose) return;
  for (const [name, bone] of boneMap) {
    const q = pose[name];
    if (!q) continue;
    bone.quaternion.set(q.x, q.y, q.z, q.w);
  }
  if (selectedBone) updateSliders();
}

// ============================================================
// UNDO / REDO
// ============================================================
const undoStack = [];
const redoStack = [];

function pushUndo() {
  undoStack.push(JSON.stringify(capturePose()));
  if (undoStack.length > 50) undoStack.shift();
  redoStack.length = 0;
}

function undo() {
  if (!undoStack.length) return;
  redoStack.push(JSON.stringify(capturePose()));
  applyPose(JSON.parse(undoStack.pop()));
}

function redo() {
  if (!redoStack.length) return;
  undoStack.push(JSON.stringify(capturePose()));
  applyPose(JSON.parse(redoStack.pop()));
}

document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'z' && !e.target.matches('input')) {
    e.preventDefault();
    undo();
  }
  if (e.ctrlKey && e.key === 'y' && !e.target.matches('input')) {
    e.preventDefault();
    redo();
  }
});

// ============================================================
// PRESETS
// ============================================================
const PRESETS = {
  TPOSE: () => { humanoid?.resetNormalizedPose(); if (selectedBone) updateSliders(); },
  HANDSUP: () => {
    const l = boneMap.get('leftUpperArm');
    const r = boneMap.get('rightUpperArm');
    if (l) l.rotation.z = degToRad(-130);
    if (r) r.rotation.z = degToRad(130);
    if (selectedBone) updateSliders();
  },
  VSIGN: () => {
    const l = boneMap.get('leftIndexProximal');
    const lm = boneMap.get('leftMiddleProximal');
    const r = boneMap.get('rightIndexProximal');
    const rm = boneMap.get('rightMiddleProximal');
    if (l) l.rotation.x = degToRad(-45);
    if (lm) lm.rotation.x = degToRad(-45);
    if (r) r.rotation.x = degToRad(-45);
    if (rm) rm.rotation.x = degToRad(-45);
    if (selectedBone) updateSliders();
  }
};

document.addEventListener('keydown', (e) => {
  if (!vrm) return;
  if (e.ctrlKey && e.key === '1') { e.preventDefault(); PRESETS.TPOSE(); }
  if (e.ctrlKey && e.key === '2') { e.preventDefault(); PRESETS.HANDSUP(); }
  if (e.ctrlKey && e.key === '3') { e.preventDefault(); PRESETS.VSIGN(); }
});

// ============================================================
// VRM LOAD
// ============================================================
openBtn.onclick = () => vrmInput.click();

vrmInput.onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  status.textContent = 'Loading...';

  const url = URL.createObjectURL(file);

  try {
    if (vrm) {
      scene.remove(vrm.scene);
      VRMUtils.deepDispose(vrm.scene);
      vrm = null;
      boneMap.clear();
      boneList.innerHTML = '';
    }

    const gltf = await loader.loadAsync(url);
    vrm = gltf.userData.vrm;

    if (!vrm) { alert('Not a VRM file'); return; }

    VRMUtils.rotateVRM0(vrm);
    scene.add(vrm.scene);

    humanoid = vrm.humanoid;
    fitCamera();
    buildSkeletonHelper();
    buildBoneList();
    updateSliders();

    // 버튼 활성화
    savePoseBtn.disabled = false;
    resetBtn.disabled = false;

    status.textContent = `✅ ${file.name}`;
  } catch (err) {
    console.error(err);
    alert(err.message);
    status.textContent = '❌ Load Error';
  } finally {
    URL.revokeObjectURL(url);
  }
};

// ============================================================
// RESET POSE
// ============================================================
resetBtn.onclick = () => {
  if (!vrm) return;
  humanoid?.resetNormalizedPose();
  if (selectedBone) updateSliders();
  pushUndo();
  status.textContent = '↺ Reset';
};

// ============================================================
// SAVE / LOAD POSE
// ============================================================
savePoseBtn.onclick = () => {
  if (!vrm) return;
  const name = prompt('Pose name:');
  if (!name) return;
  const data = { name, date: Date.now(), bones: capturePose() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name.replace(/\s+/g, '_') + '.json';
  a.click();
  URL.revokeObjectURL(url);
  status.textContent = `💾 Saved: ${name}`;
};

loadPoseBtn.onclick = () => poseInput.click();

poseInput.onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data.bones) { alert('Invalid pose file'); return; }
      applyPose(data.bones);
      pushUndo();
      status.textContent = `📂 Loaded: ${data.name || 'pose'}`;
    } catch (err) {
      alert(err.message);
    }
  };
  reader.readAsText(file);
};

// ============================================================
// KEYFRAME ANIMATION
// ============================================================
let keyframes = [];
let duration = 5.0;
let currentTime = 0;
let playing = false;
let animStartTime = 0;
const ctx = timelineCanvas.getContext('2d');

function resizeCanvas() {
  const rect = timelineCanvas.parentElement.getBoundingClientRect();
  timelineCanvas.width = rect.width - 20;
  timelineCanvas.height = 60;
  drawTimeline();
}

function addKeyframe() {
  if (!vrm) { status.textContent = '⚠️ Load VRM first'; return; }
  pushUndo();
  keyframes.push({ time: currentTime, pose: capturePose() });
  keyframes.sort((a, b) => a.time - b.time);
  if (keyframes.length > 0) {
    duration = Math.max(duration, keyframes[keyframes.length - 1].time + 0.5);
  }
  drawTimeline();
  status.textContent = `📌 Keyframe ${keyframes.length}`;
}

function drawTimeline() {
  const w = timelineCanvas.width;
  const h = timelineCanvas.height;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, w, h);

  // Track line
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(10, h / 2);
  ctx.lineTo(w - 10, h / 2);
  ctx.stroke();

  // Keyframes
  keyframes.forEach((k, i) => {
    const x = 10 + (w - 20) * (k.time / duration);
    const isLast = i === keyframes.length - 1;

    ctx.fillStyle = isLast ? '#e94560' : '#3b82f6';
    ctx.fillRect(x - 4, h / 2 - 12, 8, 24);

    ctx.fillStyle = '#888';
    ctx.font = '8px sans-serif';
    ctx.fillText(i + 1, x - 3, h / 2 - 16);
  });

  // Playhead
  const px = 10 + (w - 20) * (currentTime / duration);
  ctx.strokeStyle = '#ff6b6b';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(px, 4);
  ctx.lineTo(px, h - 4);
  ctx.stroke();

  // Time label
  timeLabel.textContent = `${currentTime.toFixed(2)}s / ${duration.toFixed(2)}s`;
}

function sampleAnimation(time) {
  if (keyframes.length === 0) return;
  if (keyframes.length === 1) { applyPose(keyframes[0].pose); return; }

  let a = keyframes[0];
  let b = keyframes[keyframes.length - 1];

  for (let i = 0; i < keyframes.length - 1; i++) {
    if (time >= keyframes[i].time && time <= keyframes[i + 1].time) {
      a = keyframes[i];
      b = keyframes[i + 1];
      break;
    }
  }

  const t = Math.max(0, Math.min(1, (time - a.time) / (b.time - a.time)));

  for (const [name, bone] of boneMap) {
    const qa = a.pose[name];
    const qb = b.pose[name];
    if (!qa || !qb) continue;

    const q1 = new THREE.Quaternion(qa.x, qa.y, qa.z, qa.w);
    const q2 = new THREE.Quaternion(qb.x, qb.y, qb.z, qb.w);
    const qr = new THREE.Quaternion();
    qr.slerpQuaternions(q1, q2, t);
    bone.quaternion.copy(qr);
  }
}

// ============================================================
// TIMELINE EVENTS
// ============================================================
addKeyBtn.onclick = addKeyframe;

clearKeyBtn.onclick = () => {
  if (keyframes.length === 0) return;
  if (!confirm('Clear all keyframes?')) return;
  keyframes = [];
  drawTimeline();
  status.textContent = '🗑️ Keyframes cleared';
};

playBtn.onclick = () => {
  if (!vrm || keyframes.length === 0) { status.textContent = '⚠️ No keyframes'; return; }
  playing = !playing;
  playBtn.textContent = playing ? '⏸' : '▶';
  if (playing) {
    animStartTime = performance.now() - currentTime * 1000;
    status.textContent = '▶️ Playing';
  } else {
    status.textContent = '⏸ Paused';
  }
};

stopBtn.onclick = () => {
  playing = false;
  currentTime = 0;
  playBtn.textContent = '▶';
  if (keyframes.length > 0) applyPose(keyframes[0].pose);
  drawTimeline();
  status.textContent = '⏹ Stopped';
};

timelineCanvas.onclick = (e) => {
  const rect = timelineCanvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  currentTime = Math.max(0, Math.min(1, x)) * duration;
  sampleAnimation(currentTime);
  drawTimeline();
  if (selectedBone) updateSliders();
};

// ============================================================
// EXPORT / SCREENSHOT
// ============================================================
exportAnimBtn.onclick = () => {
  if (keyframes.length === 0) { alert('No keyframes'); return; }
  const data = { version: 1, duration, keyframes };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'animation.json';
  a.click();
  URL.revokeObjectURL(url);
  status.textContent = '📤 Exported';
};

screenshotBtn.onclick = () => {
  renderer.render(scene, camera);
  renderer.domElement.toBlob((blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'capture.png';
    a.click();
    URL.revokeObjectURL(url);
    status.textContent = '📷 Screenshot';
  });
};

// ============================================================
// DRAG & DROP
// ============================================================
viewer.addEventListener('dragover', (e) => e.preventDefault());
viewer.addEventListener('drop', async (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file || !file.name.toLowerCase().endsWith('.vrm')) {
    alert('VRM file only');
    return;
  }
  const url = URL.createObjectURL(file);
  try {
    if (vrm) {
      scene.remove(vrm.scene);
      VRMUtils.deepDispose(vrm.scene);
    }
    const gltf = await loader.loadAsync(url);
    vrm = gltf.userData.vrm;
    VRMUtils.rotateVRM0(vrm);
    scene.add(vrm.scene);
    humanoid = vrm.humanoid;
    fitCamera();
    buildSkeletonHelper();
    buildBoneList();
    updateSliders();
    savePoseBtn.disabled = false;
    resetBtn.disabled = false;
    status.textContent = `📂 ${file.name}`;
  } catch (err) {
    alert(err.message);
  } finally {
    URL.revokeObjectURL(url);
  }
});

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' && !e.target.matches('input')) {
    e.preventDefault();
    playBtn.click();
  }
  if (e.key === 'k' && !e.target.matches('input')) {
    e.preventDefault();
    addKeyframe();
  }
  if (e.key === 'r' && !e.target.matches('input') && e.ctrlKey) {
    e.preventDefault();
    resetBtn.click();
  }
});

// ============================================================
// ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();

  if (vrm) vrm.update(delta);

  if (playing) {
    currentTime += delta;
    if (currentTime > duration) currentTime = 0;
    sampleAnimation(currentTime);
    drawTimeline();
    if (selectedBone) updateSliders();
  }

  controls.update();
  renderer.render(scene, camera);
}

// ============================================================
// FPS COUNTER
// ============================================================
let fpsFrame = 0;
let fpsTime = performance.now();

function updateFPS() {
  fpsFrame++;
  const now = performance.now();
  if (now - fpsTime >= 1000) {
    fpsLabel.textContent = `FPS: ${fpsFrame}`;
    fpsFrame = 0;
    fpsTime = now;
  }
}

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  const w = viewer.clientWidth;
  const h = viewer.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  resizeCanvas();
});

// ============================================================
// AUTOSAVE
// ============================================================
setInterval(() => {
  if (!vrm) return;
  localStorage.setItem('vrm_pose_autosave', JSON.stringify(capturePose()));
}, 5000);

// ============================================================
// INIT
// ============================================================
resizeCanvas();
drawTimeline();
animate();

// FPS update in loop
setInterval(updateFPS, 1000);

status.textContent = '🎮 Ready';

console.log('✅ VRM Pose Editor loaded');
console.log('📖 Shortcuts: Space=Play, K=Keyframe, Ctrl+Z=Undo, Ctrl+1/2/3=Presets');
</script>
</body>
