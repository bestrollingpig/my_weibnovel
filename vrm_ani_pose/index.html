<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRM 포즈 에디터</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#ccc;height:100vh;overflow:hidden;display:flex;flex-direction:column}
#header{height:48px;background:rgba(22,33,62,.95);border-bottom:1px solid #0f3460;display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0;z-index:10}
#header .title{font-size:14px;font-weight:700;color:#e94560;margin-right:12px}
#header button{background:#0f3460;color:#ccc;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:11px;transition:.2s}
#header button:hover{background:#1a4a7a}
#header button:disabled{opacity:.4;cursor:not-allowed}
#header button.primary{background:#e94560}
#header button.primary:hover{background:#ff6b81}
#header .file-info{font-size:11px;color:#888;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#header input[type=file]{display:none}
#main{display:flex;flex:1;overflow:hidden}
#viewer{flex:1;background:#0a0a0a;position:relative}
#viewer canvas{width:100%!important;height:100%!important;display:block}
#viewer .placeholder{display:flex;align-items:center;justify-content:center;height:100%;color:#555;font-size:16px;flex-direction:column;gap:8px}
#viewer .placeholder .big{font-size:48px}
#panel{width:320px;background:rgba(22,33,62,.92);border-left:1px solid #0f3460;display:flex;flex-direction:column;flex-shrink:0}
#panel .tabs{display:flex;border-bottom:1px solid #0f3460;flex-shrink:0}
#panel .tabs button{flex:1;background:transparent;border:none;color:#888;padding:8px;cursor:pointer;font-size:11px;transition:.2s}
#panel .tabs button.active{color:#fff;border-bottom:2px solid #e94560}
#panel .tabs button:hover{color:#fff}
#panel .tab-content{flex:1;overflow-y:auto;padding:8px}
#panel .tab-content.hidden{display:none}
.bone-item{padding:2px 8px;cursor:pointer;border-radius:3px;font-size:12px;display:flex;align-items:center;gap:4px;margin:1px 0}
.bone-item:hover{background:#0f3460}
.bone-item.selected{background:#e94560;color:#fff}
.slider-group{margin:4px 0;display:flex;align-items:center;gap:8px}
.slider-group label{width:12px;font-size:11px;font-weight:700;color:#888}
.slider-group input[type=range]{flex:1;height:4px;-webkit-appearance:none;background:#0f3460;border-radius:2px;outline:none}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#e94560;border-radius:50%;cursor:pointer}
.slider-group .value{width:36px;font-size:10px;color:#888;text-align:right;font-family:monospace}
.pose-presets{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0}
.pose-presets .pose-btn{background:#0f3460;border:none;color:#ccc;padding:3px 10px;border-radius:12px;font-size:10px;cursor:pointer}
.pose-presets .pose-btn:hover{background:#1a4a7a}
.pose-item{padding:4px 8px;background:rgba(15,52,96,.3);border-radius:4px;margin:2px 0;cursor:pointer;font-size:11px;display:flex;justify-content:space-between}
.pose-item:hover{background:#0f3460}
.pose-empty{color:#555;font-size:11px;padding:12px 0;text-align:center}
#timeline{height:100px;background:rgba(0,0,0,.6);border-top:1px solid #0f3460;padding:8px 12px;flex-shrink:0}
#timeline .controls{display:flex;gap:6px;align-items:center;margin-bottom:4px}
#timeline .controls button{background:#0f3460;border:none;color:#ccc;padding:2px 10px;border-radius:4px;cursor:pointer;font-size:10px;height:22px}
#timeline .controls button:hover{background:#1a4a7a}
#timeline .controls button.primary{background:#e94560}
#timeline .controls button.primary:hover{background:#ff6b81}
#timeline .controls button.success{background:#2e7d32}
#timeline .time-display{font-size:10px;color:#888;font-family:monospace;margin-left:auto;min-width:110px;text-align:right}
.timeline-track{height:40px;background:#0a0a0a;border-radius:4px;position:relative;cursor:pointer;border:1px solid #1a1a3e}
.timeline-track .keyframe{position:absolute;top:4px;width:10px;height:32px;background:#e94560;border-radius:2px;cursor:pointer;transform:translateX(-50%)}
.timeline-track .keyframe.selected{background:#4fc3f7}
.timeline-track .playhead{position:absolute;top:0;width:2px;height:100%;background:#4fc3f7;pointer-events:none}
#statusBar{height:24px;background:rgba(0,0,0,.85);border-top:1px solid #0f3460;display:flex;align-items:center;padding:0 12px;font-size:10px;color:#888;gap:12px;flex-shrink:0}
#statusBar .log{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
#statusBar .badge{color:#666}
#statusBar .badge.active{color:#4fc3f7}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#0f3460;border-radius:2px}
</style>
</head>
<body>

<div id="header">
  <span class="title">🎮 VRM Pose</span>
  <button onclick="document.getElementById('vrmInput').click()">📂 VRM 열기</button>
  <input type="file" id="vrmInput" accept=".vrm" onchange="loadVRM(event)">
  <button onclick="savePose()" id="saveBtn" class="primary" disabled>💾 포즈 저장</button>
  <button onclick="resetAll()" id="resetBtn" disabled>↺ 초기화</button>
  <span class="file-info" id="fileName">파일 없음</span>
</div>

<div id="main">
  <div id="viewer">
    <div class="placeholder" id="placeholder">
      <span class="big">🦴</span>
      <span>VRM 파일을 열어주세요</span>
    </div>
  </div>
  <div id="panel">
    <div class="tabs">
      <button class="active" data-tab="bones">🦴 본</button>
      <button data-tab="poses">📋 포즈</button>
    </div>
    <div class="tab-content" id="tab-bones">
      <div id="boneList" style="font-size:12px;color:#888;">VRM을 로드하면 본 목록이 표시됩니다</div>
      <div id="sliders" style="margin-top:8px;border-top:1px solid #0f3460;padding-top:8px;">
        <div style="color:#666;font-size:10px;text-align:center;padding:12px 0;">🌿 본을 선택하세요</div>
      </div>
    </div>
    <div class="tab-content hidden" id="tab-poses">
      <div style="display:flex;gap:4px;margin-bottom:6px;">
        <button onclick="savePose()" style="flex:1;background:#e94560;border:none;color:#fff;padding:4px;border-radius:4px;cursor:pointer;font-size:11px;">💾 현재 포즈 저장</button>
        <button onclick="document.getElementById('poseInput').click()" style="flex:1;background:#0f3460;border:none;color:#ccc;padding:4px;border-radius:4px;cursor:pointer;font-size:11px;">📂 불러오기</button>
        <input type="file" id="poseInput" accept=".json" style="display:none;" onchange="loadPose(event)">
      </div>
      <div class="pose-presets">
        <button class="pose-btn" onclick="applyPreset('default')">기본</button>
        <button class="pose-btn" onclick="applyPreset('v-sign')">✌️ 브이</button>
        <button class="pose-btn" onclick="applyPreset('heart')">❤️ 하트</button>
      </div>
      <div id="poseList"><div class="pose-empty">저장된 포즈가 없습니다</div></div>
    </div>
  </div>
</div>

<div id="timeline">
  <div class="controls">
    <button id="playBtn" onclick="togglePlay()" class="primary">▶️ 재생</button>
    <button onclick="stopPlay()">⏹ 정지</button>
    <button onclick="addKeyframe()" class="success">➕ 키프레임</button>
    <span class="time-display" id="timeDisplay">0.00s / 5.00s</span>
  </div>
  <div class="timeline-track" id="timelineTrack" onclick="onTimelineClick(event)">
    <div class="playhead" id="playhead" style="left:0%;"></div>
  </div>
</div>

<div id="statusBar">
  <span class="log" id="statusLog">● 준비</span>
  <span class="badge" id="boneCount">🦴 0</span>
  <span class="badge" id="poseCount">📋 0</span>
</div>

<!-- ============================================================
     CDN 로드 (순서 중요!)
     ============================================================ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
</script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js">
</script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js">
</script>
<script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@0.6.5/lib/three-vrm.min.js">
</script>

<script>
// ============================================================
// THREE 참조
// ============================================================
const THREE = window.THREE;
const OrbitControls = window.OrbitControls;
const GLTFLoader = window.THREE.GLTFLoader;

// VRM이 로드되었는지 확인
console.log('VRM 로드됨?', window.VRM);

// ============================================================
// 전역
// ============================================================
let scene, camera, renderer, controls;
let vrm = null;
let clock = new THREE.Clock();
let bones = {};
let boneNames = [];
let selectedBone = null;
let savedPoses = [];
let keyframes = [];
let isPlaying = false;
let currentTime = 0;
let duration = 5.0;

// ============================================================
// 로그
// ============================================================
function log(msg) {
  document.getElementById('statusLog').textContent = '● ' + msg;
  console.log(msg);
}

// ============================================================
// 씬 초기화
// ============================================================
function initScene() {
  const container = document.getElementById('viewer');
  container.innerHTML = '';
  
  const w = container.clientWidth || 800;
  const h = container.clientHeight || 600;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 20);
  camera.position.set(0, 1.2, 3.5);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0.8, 0);
  controls.enableDamping = true;
  controls.update();

  scene.add(new THREE.AmbientLight(0x8888ff, 0.4));
  const l = new THREE.DirectionalLight(0xffffff, 1.2);
  l.position.set(2, 3, 2);
  scene.add(l);

  window.addEventListener('resize', () => {
    const w2 = container.clientWidth;
    const h2 = container.clientHeight;
    if (camera && renderer) {
      camera.aspect = w2 / h2;
      camera.updateProjectionMatrix();
      renderer.setSize(w2, h2);
    }
  });

  animate();
  log('✅ 3D 씬 초기화');
}

// ============================================================
// 애니메이션 루프
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  if (vrm && vrm.update) vrm.update(delta);
  if (controls) controls.update();
  if (renderer && scene && camera) {
    renderer.render(scene, camera);
  }
}

// ============================================================
// VRM 로드
// ============================================================
window.loadVRM = function(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  document.getElementById('fileName').textContent = file.name;
  log('📂 로드 중...');

  const reader = new FileReader();
  reader.onload = async (ev) => {
    try {
      const buf = ev.target.result;
      const loader = new GLTFLoader();
      const gltf = await new Promise((res, rej) => loader.parse(buf, '', res, rej));

      if (vrm) {
        scene.remove(vrm.scene);
        vrm.dispose();
        vrm = null;
      }

      // VRM 라이브러리 확인
      if (typeof VRM === 'undefined') {
        throw new Error('VRM 라이브러리가 로드되지 않았습니다. 인터넷 연결을 확인하세요.');
      }

      vrm = await VRM.from(gltf);
      
      // VRMUtils 체크
      if (window.VRMUtils && window.VRMUtils.removeUnnecessaryJoints) {
        window.VRMUtils.removeUnnecessaryJoints(vrm.scene);
      }
      
      scene.add(vrm.scene);

      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('saveBtn').disabled = false;
      document.getElementById('resetBtn').disabled = false;

      extractBones();
      log('✅ VRM 로드 완료!');
    } catch (err) {
      log('❌ ' + err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
};

// ============================================================
// 본 추출
// ============================================================
function extractBones() {
  if (!vrm) return;
  bones = {};
  boneNames = [];
  const h = vrm.humanoid;
  
  const list = [
    'hips', 'spine', 'chest', 'upperChest', 'neck', 'head',
    'leftUpperArm', 'leftLowerArm', 'leftHand',
    'rightUpperArm', 'rightLowerArm', 'rightHand',
    'leftUpperLeg', 'leftLowerLeg', 'leftFoot',
    'rightUpperLeg', 'rightLowerLeg', 'rightFoot',
    'leftThumbProximal', 'leftIndexProximal', 'leftMiddleProximal',
    'leftRingProximal', 'leftLittleProximal',
    'rightThumbProximal', 'rightIndexProximal', 'rightMiddleProximal',
    'rightRingProximal', 'rightLittleProximal'
  ];

  for (const name of list) {
    const node = h.getNormalizedBoneNode(name);
    if (node) { bones[name] = node; boneNames.push(name); }
  }

  document.getElementById('boneCount').textContent = '🦴 ' + boneNames.length;
  renderBones();
  log('📋 ' + boneNames.length + '개 본');
}

function renderBones() {
  const c = document.getElementById('boneList');
  if (!boneNames.length) { c.innerHTML = '<div style="color:#555;">본이 없습니다</div>'; return; }
  c.innerHTML = boneNames.map(n =>
    `<div class="bone-item${n === selectedBone ? ' selected' : ''}" onclick="selectBone('${n}')">${n}</div>`
  ).join('');
}

function selectBone(name) {
  selectedBone = name;
  renderBones();
  updateSliders();
}

function updateSliders() {
  const c = document.getElementById('sliders');
  if (!selectedBone || !bones[selectedBone]) {
    c.innerHTML = '<div style="color:#666;font-size:10px;text-align:center;padding:12px 0;">🌿 본을 선택하세요</div>';
    return;
  }
  
  const b = bones[selectedBone];
  const e = new THREE.Euler().setFromQuaternion(b.quaternion);
  
  c.innerHTML = `
    <div style="color:#4fc3f7;font-size:12px;margin-bottom:4px;">${selectedBone}</div>
    ${['x','y','z'].map(a => `
      <div class="slider-group">
        <label>${a.toUpperCase()}</label>
        <input type="range" min="-3.14" max="3.14" step="0.005" value="${e[a]}" 
               oninput="updateBone('${selectedBone}','${a}',this.value)">
        <span class="value">${e[a].toFixed(3)}</span>
      </div>
    `).join('')}
    <button onclick="resetBone('${selectedBone}')" style="background:#0f3460;border:none;color:#ccc;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:10px;margin-top:4px;">↺ 초기화</button>
  `;
}

function updateBone(name, axis, value) {
  if (!bones[name]) return;
  const e = new THREE.Euler().setFromQuaternion(bones[name].quaternion);
  e[axis] = parseFloat(value);
  bones[name].quaternion.setFromEuler(e);
  
  // 슬라이더 값 업데이트
  const sliders = document.querySelectorAll('.slider-group');
  const idx = ['x','y','z'].indexOf(axis);
  if (sliders[idx]) {
    const val = sliders[idx].querySelector('.value');
    if (val) val.textContent = parseFloat(value).toFixed(3);
  }
}

function resetBone(name) {
  if (!bones[name]) return;
  bones[name].quaternion.identity();
  updateSliders();
}

// ============================================================
// 포즈
// ============================================================
function getPose() {
  const p = {};
  boneNames.forEach(n => {
    const b = bones[n];
    if (b) p[n] = { x: b.quaternion.x, y: b.quaternion.y, z: b.quaternion.z, w: b.quaternion.w };
  });
  return p;
}

function applyPose(p) {
  if (!p) return;
  for (const [n, q] of Object.entries(p)) {
    if (bones[n]) {
      const quat = new THREE.Quaternion(q.x, q.y, q.z, q.w);
      quat.normalize();
      bones[n].quaternion.copy(quat);
    }
  }
  if (selectedBone) updateSliders();
}

window.savePose = function() {
  if (!vrm) { log('⚠️ VRM 로드 필요'); return; }
  const name = prompt('포즈 이름:');
  if (!name || name.trim() === '') return;
  
  savedPoses.push({ id: Date.now(), name: name.trim(), bones: getPose() });
  updatePoseList();
  log('💾 저장: ' + name);
};

window.loadPose = function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.bones) {
        applyPose(data.bones);
        log('📂 불러오기: ' + (data.name || 'unknown'));
      }
    } catch (err) {
      log('❌ 오류: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
};

function updatePoseList() {
  const c = document.getElementById('poseList');
  document.getElementById('poseCount').textContent = '📋 ' + savedPoses.length;
  if (!savedPoses.length) { c.innerHTML = '<div class="pose-empty">저장된 포즈가 없습니다</div>'; return; }
  c.innerHTML = savedPoses.map(p =>
    `<div class="pose-item" onclick="applyPoseById(${p.id})"><span>${p.name}</span></div>`
  ).join('');
}

function applyPoseById(id) {
  const p = savedPoses.find(x => x.id === id);
  if (p) { applyPose(p.bones); log('📋 적용: ' + p.name); }
}

// ============================================================
// 프리셋 (Quaternion 정규화 적용 - toJSON 제거)
// ============================================================
const PRESETS = {
  'default': null,
  'v-sign': {
    leftUpperArm: (() => { const q = new THREE.Quaternion(0.2, -0.1, -0.3, 0.9); q.normalize(); return {x:q.x, y:q.y, z:q.z, w:q.w}; })(),
    rightUpperArm: (() => { const q = new THREE.Quaternion(-0.2, -0.1, 0.3, 0.9); q.normalize(); return {x:q.x, y:q.y, z:q.z, w:q.w}; })()
  },
  'heart': {
    leftUpperArm: (() => { const q = new THREE.Quaternion(-0.5, -0.3, -0.4, 0.6); q.normalize(); return {x:q.x, y:q.y, z:q.z, w:q.w}; })(),
    rightUpperArm: (() => { const q = new THREE.Quaternion(-0.5, 0.3, 0.4, 0.6); q.normalize(); return {x:q.x, y:q.y, z:q.z, w:q.w}; })()
  }
};

function applyPreset(name) {
  if (name === 'default') { 
    if (vrm && vrm.humanoid) vrm.humanoid.resetPose(); 
    if (selectedBone) updateSliders(); 
    log('↺ 기본'); 
    return; 
  }
  const p = PRESETS[name];
  if (p) { 
    applyPose(p); 
    log('📋 프리셋: ' + name); 
  }
}

// ============================================================
// 키프레임
// ============================================================
function addKeyframe() {
  if (!vrm) { log('⚠️ VRM 로드 필요'); return; }
  const name = prompt('키프레임 이름:', 'KF ' + (keyframes.length + 1));
  if (!name) return;
  
  keyframes.push({ time: currentTime, name: name, pose: getPose() });
  keyframes.sort((a, b) => a.time - b.time);
  if (keyframes.length) duration = Math.max(duration, keyframes[keyframes.length - 1].time + 0.5);
  updateTimeline();
  log('✅ 키프레임 추가: ' + name);
}

function onTimelineClick(e) {
  const track = document.getElementById('timelineTrack');
  const rect = track.getBoundingClientRect();
  currentTime = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)) * duration;
  applyKeyframe(currentTime);
  updateTimeline();
}

function applyKeyframe(t) {
  if (!vrm || !keyframes.length) return;
  let pi = -1, ni = -1;
  for (let i = 0; i < keyframes.length; i++) {
    if (keyframes[i].time <= t) pi = i;
    if (keyframes[i].time >= t && ni === -1) ni = i;
  }
  if (pi === -1 || ni === -1 || pi === ni) { 
    if (pi !== -1) applyPose(keyframes[pi].pose); 
    return; 
  }
  
  const prev = keyframes[pi], next = keyframes[ni];
  const f = Math.max(0, Math.min(1, (t - prev.time) / (next.time - prev.time)));
  const q1 = new THREE.Quaternion(), q2 = new THREE.Quaternion(), r = new THREE.Quaternion();
  const names = new Set([...Object.keys(prev.pose), ...Object.keys(next.pose)]);
  
  for (const n of names) {
    if (!bones[n]) continue;
    const p1 = prev.pose[n], p2 = next.pose[n];
    if (!p1 || !p2) { 
      const p = p1 || p2; 
      if (p) bones[n].quaternion.set(p.x, p.y, p.z, p.w); 
      continue; 
    }
    q1.set(p1.x, p1.y, p1.z, p1.w);
    q2.set(p2.x, p2.y, p2.z, p2.w);
    r.slerpQuaternions(q1, q2, f);
    bones[n].quaternion.copy(r);
  }
}

function updateTimeline() {
  const track = document.getElementById('timelineTrack');
  const ph = document.getElementById('playhead');
  const pct = (currentTime / duration) * 100;
  ph.style.left = Math.min(pct, 100) + '%';
  document.getElementById('timeDisplay').textContent = currentTime.toFixed(2) + 's / ' + duration.toFixed(2) + 's';
  track.querySelectorAll('.keyframe').forEach(el => el.remove());
  
  keyframes.forEach((k, i) => {
    const el = document.createElement('div');
    el.className = 'keyframe' + (i === keyframes.length - 1 ? ' selected' : '');
    el.style.left = ((k.time / duration) * 100) + '%';
    el.title = k.name + ' (' + k.time.toFixed(2) + 's)';
    track.appendChild(el);
  });
}

function togglePlay() {
  if (!vrm || !keyframes.length) { log('⚠️ 키프레임 없음'); return; }
  isPlaying = !isPlaying;
  document.getElementById('playBtn').textContent = isPlaying ? '⏸ 일시정지' : '▶️ 재생';
  
  if (isPlaying) {
    const start = performance.now() - currentTime * 1000;
    (function loop() {
      if (!isPlaying) return;
      currentTime = ((performance.now() - start) / 1000) % duration;
      applyKeyframe(currentTime);
      updateTimeline();
      requestAnimationFrame(loop);
    })();
  }
}

function stopPlay() {
  isPlaying = false;
  currentTime = 0;
  document.getElementById('playBtn').textContent = '▶️ 재생';
  if (keyframes.length) applyPose(keyframes[0].pose);
  updateTimeline();
}

// ============================================================
// 초기화
// ============================================================
function resetAll() {
  if (!confirm('초기화?')) return;
  
  if (vrm) {
    scene.remove(vrm.scene);
    vrm.dispose();
    vrm = null;
  }
  
  bones = {};
  boneNames = [];
  selectedBone = null;
  savedPoses = [];
  keyframes = [];
  isPlaying = false;
  currentTime = 0;
  duration = 5.0;
  clock = new THREE.Clock();
  
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('fileName').textContent = '파일 없음';
  document.getElementById('saveBtn').disabled = true;
  document.getElementById('resetBtn').disabled = true;
  document.getElementById('boneCount').textContent = '🦴 0';
  document.getElementById('poseCount').textContent = '📋 0';
  document.getElementById('boneList').innerHTML = '<div style="color:#555;">VRM을 로드하면 본 목록이 표시됩니다</div>';
  document.getElementById('sliders').innerHTML = '<div style="color:#666;font-size:10px;text-align:center;padding:12px 0;">🌿 본을 선택하세요</div>';
  document.getElementById('playBtn').textContent = '▶️ 재생';
  document.getElementById('timeDisplay').textContent = '0.00s / 5.00s';
  
  const track = document.getElementById('timelineTrack');
  track.querySelectorAll('.keyframe').forEach(el => el.remove());
  document.getElementById('playhead').style.left = '0%';
  
  updatePoseList();
  log('🔄 초기화됨');
}

// ============================================================
// 탭 전환
// ============================================================
document.querySelectorAll('.tabs button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(x => x.classList.add('hidden'));
    document.getElementById('tab-' + b.dataset.tab).classList.remove('hidden');
  };
});

// ============================================================
// 단축키
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 's' && !e.target.matches('input, textarea')) {
    e.preventDefault();
    savePose();
  }
  if (e.key === ' ' && !e.target.matches('input, textarea')) {
    e.preventDefault();
    togglePlay();
  }
});

// ============================================================
// 실행
// ============================================================
initScene();
log('🎮 VRM Pose Editor 준비 완료');

// 전역 노출
window.loadVRM = loadVRM;
window.savePose = savePose;
window.resetAll = resetAll;
window.loadPose = loadPose;
window.applyPreset = applyPreset;
window.addKeyframe = addKeyframe;
window.togglePlay = togglePlay;
window.stopPlay = stopPlay;
window.onTimelineClick = onTimelineClick;
</script>
</body>
</html>
