                document.getElementById('saveProject').addEventListener('click', this.saveProject.bind(this));
                document.getElementById('loadProject').addEventListener('click', () => {
                    this.projectInput.click();
                });
                this.projectInput.addEventListener('change', (e) => {
                    if (e.target.files && e.target.files[0]) {
                        this.loadProject(e.target.files[0]);
                    }
                    e.target.value = '';
                });

                // 브러시 옵션
                document.getElementById('brushSize').addEventListener('input', (e) => {
                    document.getElementById('sizeLabel').textContent = e.target.value;
                });
                document.getElementById('opacity').addEventListener('input', (e) => {
                    document.getElementById('opacityLabel').textContent = e.target.value + '%';
                });

                console.log('✅ 모든 이벤트 연결 완료!');
            }

            // ====== 마우스 이벤트 ======
            onMouseDown(e) {
                if (!this.vrmModel) return;
                const result = this.getUVFromClick(e);
                if (!result) return;

                const tool = this.currentTool;

                if (tool === 'brush' || tool === 'eraser') {
                    this.isPainting = true;
                    this.lastUV = result.uv;
                    this.currentMesh = result.mesh;
                    const color = tool === 'eraser' ? '#00000000' : document.getElementById('colorPicker').value;
                    const size = parseInt(document.getElementById('brushSize').value);
                    const opacity = tool === 'eraser' ? 100 : parseInt(document.getElementById('opacity').value);
                    this.paintOnUV(result.uv, result.mesh, color, size, opacity);
                } else if (tool === 'fill') {
                    this.floodFill(result.uv, result.mesh, document.getElementById('colorPicker').value);
                } else if (tool === 'line') {
                    this.lineStart = result;
                    this.lineStartUV = result.uv;
                    this.lineMesh = result.mesh;
                } else if (tool === 'lasso' || tool === 'polygon') {
                    this.startSelection(result.uv, result.mesh);
                } else if (tool === 'rect-select') {
                    this.rectSelect(result.uv, result.mesh);
                } else if (tool === 'circle-select') {
                    this.circleSelect(result.uv, result.mesh);
                } else if (tool === 'magic') {
                    this.magicSelect(result.uv, result.mesh);
                }
            }

            onMouseMove(e) {
                if (!this.vrmModel) return;
                const result = this.getUVFromClick(e);
                if (!result) return;

                if (this.isPainting && (this.currentTool === 'brush' || this.currentTool === 'eraser')) {
                    const now = Date.now();
                    if (now - this.lastPaintTime < this.paintInterval) return;
                    this.lastPaintTime = now;

                    const color = this.currentTool === 'eraser' ? '#00000000' : document.getElementById('colorPicker')
                        .value;
                    const size = parseInt(document.getElementById('brushSize').value);
                    const opacity = this.currentTool === 'eraser' ? 100 : parseInt(document.getElementById('opacity')
                        .value);
                    this.paintOnUV(result.uv, result.mesh, color, size, opacity);
                    this.lastUV = result.uv;
                    this.currentMesh = result.mesh;
                } else if (this.isSelecting && (this.currentTool === 'lasso' || this.currentTool === 'polygon')) {
                    this.addSelectionPoint(result.uv);
                }
            }

            onMouseUp(e) {
                if (this.isPainting) {
                    this.isPainting = false;
                    this.saveHistory();
                }
                if (this.isSelecting && (this.currentTool === 'lasso' || this.currentTool === 'polygon')) {
                    this.endSelection();
                }
                if (this.currentTool === 'line' && this.lineStart) {
                    const result = this.getUVFromClick(e);
                    if (result && result.mesh === this.lineMesh) {
                        const color = document.getElementById('colorPicker').value;
                        const size = parseInt(document.getElementById('brushSize').value);
                        const opacity = parseInt(document.getElementById('opacity').value);
                        this.drawLine(this.lineStartUV, result.uv, this.lineMesh, color, size, opacity);
                    }
                    this.lineStart = null;
                    this.lineStartUV = null;
                    this.lineMesh = null;
                }
            }

            onMouseLeave(e) {
                if (this.isPainting) {
                    this.isPainting = false;
                    this.saveHistory();
                }
            }

            // ====== 터치 이벤트 ======
            onTouchStart(e) {
                e.preventDefault();
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousedown', {
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                this.onMouseDown(mouseEvent);
            }

            onTouchMove(e) {
                e.preventDefault();
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousemove', {
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                this.onMouseMove(mouseEvent);
            }

            onTouchEnd(e) {
                e.preventDefault();
                const mouseEvent = new MouseEvent('mouseup', {});
                this.onMouseUp(mouseEvent);
            }

            // ====== 키보드 이벤트 ======
            onKeyDown(e) {
                // Undo/Redo
                if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    if (e.shiftKey) this.redo();
                    else this.undo();
                    return;
                }

                // 도구 단축키
                const toolMap = {
                    'b': 'brush',
                    'e': 'eraser',
                    'f': 'fill',
                    'l': 'line',
                    '1': 'lasso',
                    '2': 'polygon',
                    '3': 'rect-select',
                    '4': 'circle-select',
                    '5': 'magic'
                };

                if (e.key in toolMap) {
                    const tool = toolMap[e.key];
                    document.querySelectorAll('.tool').forEach(t => {
                        t.classList.toggle('active', t.dataset.tool === tool);
                    });
                    this.currentTool = tool;
                    this.cancelSelection();
                    this.updateToolBadge();
                }

                // Escape
                if (e.key === 'Escape') {
                    this.cancelSelection();
                }
            }

            // ====== 애니메이션 ======
            animate() {
                requestAnimationFrame(this.animate.bind(this));
                this.controls.update();

                // 오버레이 업데이트 (선택 상태 유지)
                if (this.isSelectionActive && this.selectionPoints.length >= 3) {
                    this.drawSelectionOverlay();
                }

                this.renderer.render(this.scene, this.camera);
            }
        }

        // ============================================================
        //  실행
        // ============================================================
        console.log('🚀 VRM 3D 맵 에디터 Pro 시작!');
        const app = new VRMMapEditorPro();
        window.app = app;
    </script>
</body>
</html>
